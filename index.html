<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>던전앤도구리</title>
  <style>
    :root {
      --bg: #151515;
      --gold: #ffd166;
      --red: #ff5a6d;
      --heart: #ff526b;
      --empty-heart: #3b3b3b;
      --text: #f8f1dc;
      --muted: #9a9a9a;
      --good: #68e0a8;
      --panel: rgba(28, 28, 28, .82);
      --panel-line: rgba(255, 255, 255, .16);
    }

    * {
      box-sizing: border-box;
      -webkit-user-drag: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fcf9f2;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #game, button, div, span, p, h1, h2, h3, small {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #game {
      position: relative;
      width: min(100vw, 1180px);
      height: min(100vh, 720px);
      min-height: 560px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      isolation: isolate;
    }


    .dungeon {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 208px;
      overflow: hidden;
      background: #151515 url("dungeon_bg.png") center bottom / cover no-repeat;
    }

    .dungeon .ceiling,
    .dungeon .floor,
    .dungeon .left-wall,
    .dungeon .right-wall,
    .dungeon .back-wall,
    .dungeon .torch {
      display: none;
    }

    .ceiling, .floor, .left-wall, .right-wall, .back-wall {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .back-wall {
      top: 15%;
      left: 22%;
      right: 22%;
      bottom: 42%;
      border: 3px solid rgba(255,255,255,.06);
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px) 0 0/58px 58px,
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px) 0 0/58px 58px,
        linear-gradient(180deg, #303030, #1a1a1a);
      box-shadow: inset 0 0 90px rgba(0,0,0,.55), 0 0 120px rgba(0,0,0,.55);
      clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%);
    }

    .ceiling {
      bottom: 54%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 2px, transparent 2px 92px),
        linear-gradient(180deg, #2e2e2e, #151515);
      clip-path: polygon(0 0, 100% 0, 72% 100%, 28% 100%);
      opacity: .86;
    }

    .floor {
      top: 45%;
      background:
        linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,.08) 49.5% 50.5%, transparent 51%),
        repeating-conic-gradient(from 45deg at 50% 0%, rgba(255,255,255,.035) 0 25%, transparent 0 50%) 0 0/140px 140px,
        linear-gradient(180deg, #202020, #070707 76%);
      clip-path: polygon(28% 0, 72% 0, 100% 100%, 0 100%);
      box-shadow: inset 0 80px 120px rgba(0,0,0,.38);
    }

    .left-wall {
      right: 50%;
      background:
        repeating-linear-gradient(18deg, rgba(255,255,255,.04) 0 2px, transparent 2px 58px),
        linear-gradient(90deg, #303030, #161616);
      clip-path: polygon(0 0, 100% 38%, 100% 100%, 0 100%);
      opacity: .78;
    }

    .right-wall {
      left: 50%;
      background:
        repeating-linear-gradient(-18deg, rgba(255,255,255,.04) 0 2px, transparent 2px 58px),
        linear-gradient(270deg, #343434, #161616);
      clip-path: polygon(0 38%, 100% 0, 100% 100%, 0 100%);
      opacity: .78;
    }

    .torch {
      position: absolute;
      width: 48px;
      height: 86px;
      top: 23%;
      z-index: 4;
      filter: drop-shadow(0 0 18px rgba(255,146,55,.6));
    }

    .torch.left { left: 15%; }
    .torch.right { right: 15%; transform: scaleX(-1); }

    .torch::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 38px;
      width: 16px;
      height: 46px;
      border-radius: 9px;
      background: linear-gradient(#6b3b20, #2f1b14);
      transform: rotate(12deg);
    }

    .torch::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 0;
      width: 30px;
      height: 46px;
      border-radius: 50% 50% 45% 45%;
      background:
        radial-gradient(circle at 50% 65%, #fff3a1 0 18%, transparent 20%),
        radial-gradient(circle at 50% 52%, #ffb13d 0 38%, transparent 40%),
        radial-gradient(circle at 50% 45%, #ff5c2d 0 58%, transparent 60%);
      animation: flame .22s infinite alternate ease-in-out;
      transform-origin: 50% 100%;
    }

    @keyframes flame {
      from { transform: scale(.95, 1.08) rotate(-3deg); filter: brightness(1); }
      to { transform: scale(1.06, .94) rotate(4deg); filter: brightness(1.22); }
    }

    #monsterLayer {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .monster {
      --x: 0px;
      --y: 43%;
      --scale: 1;
      position: absolute;
      left: calc(50% + var(--x));
      top: var(--y);
      width: 267px;
      height: 330px;
      transform: translate(-50%, -50%) scale(var(--scale));
      transform-origin: 50% 50%;
      display: grid;
      justify-items: center;
      animation: monsterIn .24s cubic-bezier(.2, 1.3, .45, 1) both;
      filter: drop-shadow(0 24px 22px rgba(0,0,0,.42));
      transition: left .16s ease-out, top .16s ease-out;
    }

    .monster::after {
      content: "";
      position: absolute;
      z-index: 0;
      left: 50%;
      top: 232px;
      width: 212px;
      height: 40px;
      translate: -50% 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, .34);
      filter: blur(10px);
      pointer-events: none;
    }

    .monster.lane-left { --x: -260px; --scale: 1; }
    .monster.lane-mid { --x: 0px; --scale: 1; }
    .monster.lane-right { --x: 260px; --scale: 1; }

    .monster.attack {
      animation: monsterAttack .28s ease-in-out both;
    }

    .monster.attack .monster-body {
      transform-origin: 50% 70%;
      animation: monsterAttackBody .28s ease-in-out both;
    }

    .monster.hit .monster-body {
      animation: monsterHit .16s ease-out both;
    }

    .monster.dead .monster-body {
      filter: grayscale(1) brightness(.78);
    }

    .monster-hit-slash {
      position: absolute;
      z-index: 6;
      left: calc(50% + var(--slash-offset-x, 0px));
      top: calc(52% + var(--slash-offset-y, 0px) + var(--hit-effect-offset-y, 0px));
      width: 190px;
      height: 56px;
      pointer-events: none;
      translate: -50% -50%;
      visibility: hidden;
    }

    .monster-hit-slash::before {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: 24px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 0%, #fff8d6 12%, #ffffff 48%, #ffd166 84%, transparent 100%);
      transform: rotate(calc(-28deg + var(--slash-rotate, 0deg)));
      transform-origin: 50% 50%;
    }

    .monster.hit .monster-hit-slash {
      visibility: visible;
      animation: monsterSlashTrail .18s ease-out both;
    }

    .defeat-burst {
      position: absolute;
      z-index: 8;
      left: 50%;
      top: 58%;
      width: 110px;
      height: 72px;
      translate: -50% -50%;
      transform-origin: 50% 50%;
      pointer-events: none;
      opacity: 0;
    }

    .defeat-burst span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--dust-size, 24px);
      height: var(--dust-size, 24px);
      margin-left: calc(var(--dust-size, 24px) * -0.5);
      margin-top: calc(var(--dust-size, 24px) * -0.5);
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, rgba(230,222,210,.68), rgba(152,140,124,.92) 42%, rgba(82,72,62,.92) 100%);
      filter: blur(2px);
      opacity: 0;
      transform: translate(0, 0) scale(.25);
    }

    .defeat-burst span:nth-child(1) { --dust-size: 30px; --dust-x: -24px; --dust-y: -8px; }
    .defeat-burst span:nth-child(2) { --dust-size: 34px; --dust-x: -10px; --dust-y: -18px; }
    .defeat-burst span:nth-child(3) { --dust-size: 28px; --dust-x: 10px; --dust-y: -14px; }
    .defeat-burst span:nth-child(4) { --dust-size: 32px; --dust-x: 28px; --dust-y: -4px; }
    .defeat-burst span:nth-child(5) { --dust-size: 36px; --dust-x: -28px; --dust-y: 10px; }
    .defeat-burst span:nth-child(6) { --dust-size: 38px; --dust-x: -4px; --dust-y: 12px; }
    .defeat-burst span:nth-child(7) { --dust-size: 30px; --dust-x: 18px; --dust-y: 14px; }
    .defeat-burst span:nth-child(8) { --dust-size: 24px; --dust-x: 34px; --dust-y: 10px; }

    .monster.dead {
      animation: monsterDead .38s ease-in both;
    }

    .monster.dead .defeat-burst {
      opacity: 1;
      transform: scale(3);
    }

    .monster.dead .defeat-burst span {
      animation: defeatDust .42s ease-out both;
    }

    @keyframes monsterIn {
      from { opacity: 0; transform: translate(-50%, -50%) translateY(30px) scale(calc(var(--scale) * .72)); }
      to { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(var(--scale)); }
    }


    @keyframes monsterAttack {
      0% { translate: 0 0; filter: drop-shadow(0 24px 22px rgba(0,0,0,.52)); }
      48% { translate: 0 60px; filter: drop-shadow(0 10px 12px rgba(0,0,0,.65)) brightness(1.25); }
      100% { translate: 0 0; }
    }

    @keyframes monsterAttackBody {
      0%, 100% { transform: scale(1); }
      48% { transform: scale(1.18); }
    }

    @keyframes monsterHit {
      0%, 100% { transform: translateX(0) scale(1); filter: none; }
      35% { transform: translateX(-8px) scale(1.04); filter: brightness(1.65) saturate(1.25); }
      70% { transform: translateX(5px) scale(.98); filter: brightness(1.2); }
    }

    @keyframes monsterSlashTrail {
      0% { visibility: visible; transform: translate(-40px, 18px) scale(.88, .96); }
      85% { visibility: visible; transform: translate(10px, -6px) scale(1.08, 1.02); }
      100% { visibility: hidden; transform: translate(28px, -14px) scale(.98, .94); }
    }

    @keyframes defeatDust {
      0% { opacity: 0; transform: translate(0, 0) scale(.25); }
      22% { opacity: .92; }
      100% { opacity: 0; transform: translate(var(--dust-x), var(--dust-y)) scale(1.28); }
    }

    @keyframes resultPop {
      0% { opacity: 0; transform: translate(-50%, calc(var(--stack-offset) + 6px)) scale(.96); }
      8% { opacity: 1; transform: translate(-50%, var(--stack-offset)) scale(1); }
      17% { opacity: 1; transform: translate(-50%, var(--stack-offset)) scale(1); }
      100% { opacity: 0; transform: translate(-50%, var(--stack-offset)) scale(.98); }
    }

    @keyframes monsterDead {
      to { opacity: 0; transform: translate(-50%, -50%) translateY(-20px) scale(var(--scale)); filter: grayscale(1) blur(4px) brightness(.9); }
    }

    .monster.jump-away {
      animation: monsterJumpAway .36s ease-in both;
    }

    @keyframes monsterJumpAway {
      to { opacity: 0; transform: translate(-50%, -50%) translateY(-460px) scale(var(--scale)); filter: drop-shadow(0 8px 12px rgba(0,0,0,.35)); }
    }

    .nameplate {
      position: absolute;
      z-index: 2;
      top: -2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 250px;
      padding: 9px 12px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      white-space: nowrap;
    }

    .lethal-skull {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: -27px;
      width: 32px;
      height: 32px;
      translate: -50% 0;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,.55)) drop-shadow(0 8px 12px rgba(0,0,0,.42));
    }

    .monster.treasure-chest .timer-ring {
      display: none;
    }

    .monster.treasure-chest .nameplate {
      top: 42px;
    }

    .monster.treasure-chest.chest-opened .nameplate {
      opacity: 0;
      pointer-events: none;
    }

    .monster.treasure-chest.chest-opened .monster-body {
      filter: none;
    }

    .monster.treasure-chest.chest-opened .defeat-burst {
      opacity: 1;
      transform: scale(3);
    }

    .monster.treasure-chest.chest-opened .defeat-burst span {
      animation: defeatDust .42s ease-out both;
    }

    .monster.level-low {
      --hit-effect-offset-y: 30px;
    }

    .monster.level-low .nameplate {
      top: 43px;
    }

    .monster-results {
      position: absolute;
      left: 50%;
      top: -20px;
      translate: -50% 0;
      width: 180px;
      pointer-events: none;
    }

    .monster-result {
      position: absolute;
      left: 50%;
      top: 0;
      translate: -50% 0;
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .03em;
      text-shadow: 0 2px 0 rgba(0,0,0,.65);
      white-space: nowrap;
      --stack-offset: 0px;
    }

    .monster-result.show {
      animation: resultPop 1s ease-out both;
    }

    .monster-result.perfect { color: #ffe88e; }
    .monster-result.great { color: #ffd166; }
    .monster-result.good { color: #68e0a8; }
    .monster-result.bad { color: #cfc3dc; }
    .monster-result.miss { color: #ff8e9b; }

    .word {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: .4px;
      color: #fff7de;
      text-shadow: 0 2px 0 #000;
    }

    .word .done {
      color: #4e4853;
      text-shadow: none;
    }

    .word .need-input {
      color: #ff5a6d;
      text-shadow: 0 2px 0 rgba(0,0,0,.75);
    }

    .word .space {
      display: inline-block;
      width: .45em;
    }

    .timer-ring {
      position: relative;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: conic-gradient(var(--red) 0deg, rgba(255,255,255,.13) 0deg);
      box-shadow: inset 0 0 0 3px rgba(0,0,0,.48), 0 0 16px rgba(255,90,109,.2);
    }

    .timer-ring::after {
      content: attr(data-time);
      position: absolute;
      inset: 6px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #14101a;
      color: #fff1d1;
      font-size: 9px;
      font-weight: 900;
    }

    .monster-body {
      position: relative;
      z-index: 1;
      width: 270px;
      height: 270px;
      margin-top: 28px;
      background-image: var(--monster-sprite-image, url('monsters.png'));
      background-size: 400% 400%;
      background-position: var(--monster-sprite-x, 0%) var(--monster-sprite-y, 0%);
      background-repeat: no-repeat;
    }

    .enemy-lv {
      display: none;
    }


    #guardShield {
      position: absolute;
      z-index: 14;
      left: 60px;
      bottom: 76px;
      width: 256px;
      height: 256px;
      transform-origin: 30% 80%;
      scale: 1.2;
      transform: rotate(16deg) translate(-10px, 10px);
      filter: drop-shadow(0 28px 18px rgba(0,0,0,.5));
      pointer-events: none;
      transition: transform .12s ease-out, filter .12s ease-out;
    }

    #guardShield img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    #guardShield.holding {
      transform: rotate(3deg) translate(6px, -10px) scale(1.03);
      filter: drop-shadow(0 32px 20px rgba(0,0,0,.56)) brightness(1.08);
    }

    #guardShield.block {
      animation: shieldBlock .18s ease-out both;
    }

    @keyframes shieldBlock {
      0% { transform: rotate(3deg) translate(6px, -10px) scale(1.03); }
      45% { transform: rotate(-4deg) translate(16px, -20px) scale(1.08); }
      100% { transform: rotate(3deg) translate(6px, -10px) scale(1.03); }
    }

    #sword {
      position: absolute;
      z-index: 14;
      right: 58px;
      bottom: 122px;
      width: 128px;
      height: 256px;
      transform-origin: 78% 86%;
      scale: 1.2;
      transform: rotate(-24deg) translate(10px, 12px);
      filter: drop-shadow(0 28px 18px rgba(0,0,0,.55));
      pointer-events: none;
    }

    #sword img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    #sword.slash {
      animation: slash .16s cubic-bezier(.15, .9, .2, 1) both;
    }

    @keyframes slash {
      0% { transform: rotate(-24deg) translate(10px, 12px); }
      42% { transform: rotate(-60deg) translate(-32px, -16px) scale(1.06); filter: drop-shadow(0 28px 18px rgba(0,0,0,.55)) brightness(1.4); }
      100% { transform: rotate(-24deg) translate(10px, 12px); }
    }

    #hud {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 18;
      min-height: 208px;
      padding: 24px 22px 16px;
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr) 84px;
      grid-template-rows: auto auto auto;
      gap: 10px 16px;
      align-items: center;
      color: #fff6d7;
      background: #222220;
      border-top: 2px solid rgba(255, 246, 215, .12);
      box-shadow: 0 -18px 40px rgba(0,0,0,.38);
    }

    .portrait-panel {
      position: relative;
      z-index: 10;
      grid-column: 1;
      grid-row: 1 / span 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 104px;
      align-self: center;
      translate: 0 -10px;
    }

    .input-bubble {
      position: absolute;
      left: 50%;
      top: -50px;
      z-index: 30;
      min-width: 46px;
      padding: 7px 13px;
      border-radius: 15px;
      background: #fcf9f2;
      color: #21131c;
      font-size: 18px;
      font-weight: 950;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      word-break: keep-all;
      writing-mode: horizontal-tb;
      width: max-content;
      opacity: 0;
      pointer-events: none;
      translate: -50% 0;
      transform: translateY(8px) scale(.9);
    }

    .input-bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      width: 7px;
      height: 7px;
      background: inherit;
      rotate: 45deg;
      translate: -50% 0;
      border-radius: 1px;
    }

    .input-bubble.show {
      animation: inputBubblePop .46s ease-out both;
    }

    @keyframes inputBubblePop {
      0% { opacity: 0; transform: translateY(8px) scale(.9); }
      16% { opacity: 1; transform: translateY(0) scale(1); }
      72% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-6px) scale(.96); }
    }

    #portrait {
      position: relative;
      width: 104px;
      height: 104px;
      border-radius: 0;
      background: transparent;
      border: 0;
      overflow: visible;
      box-shadow: none;
    }

    #profileImage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    #portrait.hit {
      animation: portraitHit .24s ease both;
    }

    @keyframes portraitHit {
      0%, 100% { transform: translateX(0); filter: none; }
      20% { transform: translateX(-7px); filter: brightness(1.8) saturate(1.4); }
      45% { transform: translateX(8px); }
      70% { transform: translateX(-4px); }
    }

    .blood-flash {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background: radial-gradient(circle, transparent 35%, rgba(255, 30, 55, .34));
      opacity: 0;
    }

    .blood-flash.show {
      animation: blood .22s ease both;
    }

    .blood-flash.blocked {
      background: radial-gradient(circle, transparent 35%, rgba(90, 165, 255, .34));
    }


    @keyframes blood {
      0% { opacity: 0; }
      35% { opacity: 1; }
      100% { opacity: 0; }
    }

    .hud-main {
      grid-column: 2;
      grid-row: 1 / span 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 11px;
      min-width: 0;
      align-self: center;
    }

    .stats-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    #hearts {
      display: flex;
      align-items: center;
      gap: 0;
      line-height: 1;
      filter: none;
    }

    .heart-icon {
      display: block;
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex: 0 0 auto;
      pointer-events: none;
    }

    .heart-icon.empty {
      opacity: .24;
      filter: grayscale(1);
    }

    .heart-icon + .heart-icon { margin-left: -1px; }

    #shields {
      display: flex;
      align-items: center;

      z-index: 1;
      background-position: 100% 0;
      opacity: 0;

    .lobby-difficulty-button.hard::before,

    .lobby-difficulty-button:active,
    .lobby-difficulty-button.pressed {
      scale: 1;
      transform: none;
      box-shadow: none;
      filter: none;
    }

    .lobby-difficulty-button:active::after,
    .lobby-difficulty-button.pressed::after {
      animation: gateHoverPulse 1s cubic-bezier(.37, 0, .63, 1) infinite alternate;
    }

      from { opacity: .5; }
      to { opacity: .75; }

      height: 1px;

    const homeButton = document.getElementById('homeButton');
    const homeHintKbd = document.querySelector('.home-hint .kbd');
    const monsterTable = document.getElementById('monsterTable');
    const comboToast = document.getElementById('comboToast');
    const floorText = document.getElementById('floorText');
    const floorProgressText = document.getElementById('floorProgressText');

    const alphaKeyboard = document.getElementById('alphaKeyboard');
    const dungeonEl = document.querySelector('.dungeon');
    const lobbyDifficultyLayer = document.getElementById('lobbyDifficultyLayer');
    const lobbyDifficultyButtons = document.getElementById('lobbyDifficultyButtons');
    const lobbyInfoButton = document.getElementById('lobbyInfoButton');
    const screenFade = document.getElementById('screenFade');

    let player;
    let monsters;
    let activeMonsterId;
    let inputHintMode;
    let lastTime;
    let spawnTimer;
    let nextMonsterId;
    let lastSpawnedMonsterKey;
    let gameState;
    let elapsed;
    let animationId;
    let lastInputTime;
    let isBlocking = false;
    let progressKeyArmed = true;
    let dragonSpawned = false;
    let currentFloor = 1;
    let floorSpawned = 0;
    let floorKills = 0;
    let floorFirstBossSpawned = false;
    let clearChestSpawned = false;
    let pendingRewardTreasure = null;
    let stageProgressReady = false;
    let stageProgressDelayTimeout = null;
    let shieldBlockTimeout = null;
    let profilePainTimeout = null;
    let cheatCodeEnabled = false;
    let selectedCheatFloor = 1;
    let isSceneTransitioning = false;
    let currentDifficultyKey = DEFAULT_DIFFICULTY_KEY;
    const lobbyBgImage = new Image();
