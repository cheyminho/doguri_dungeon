    function preventScreenGesture(e) {
      if (e.cancelable) e.preventDefault();
    }

    ['touchmove', 'gesturestart', 'gesturechange', 'gestureend'].forEach(eventName => {
      document.addEventListener(eventName, preventScreenGesture, { passive: false });
    });
    document.addEventListener('dragstart', preventScreenGesture, { passive: false });
    window.addEventListener('wheel', (e) => {
      if (e.ctrlKey && e.cancelable) e.preventDefault();
    }, { passive: false });

    function normalizeName(name) {
      return name.toLowerCase().replace(/\s+/g, '');
    }

    function expNeeded(level) {
      // 레벨업 발생 빈도를 기존 대비 약 70% 느낌으로 낮추기 위해 필요 경험치를 1 / 0.7배로 보정합니다.
      return Math.floor((140 * Math.pow(1.35, level - 1)) / LEVEL_UP_OCCURRENCE_RATE);
    }

    function expReward(monsterLevel) {
      if (monsterLevel === 13) return 0;
      return 34 + monsterLevel * 13;
    }

    function getCurrentDifficultyConfig() {
      return DIFFICULTY_CONFIGS[currentDifficultyKey] || DIFFICULTY_CONFIGS[DEFAULT_DIFFICULTY_KEY];
    }

    function setCurrentDifficulty(key) {
      currentDifficultyKey = DIFFICULTY_CONFIGS[key] ? key : DEFAULT_DIFFICULTY_KEY;
    }


    function getCurrentDifficultyLabel() {
      return getCurrentDifficultyConfig().label || DIFFICULTY_CONFIGS[DEFAULT_DIFFICULTY_KEY].label;
    }

    function getChestConfigForDifficulty() {
      return CHEST_CONFIGS[currentDifficultyKey] || CHEST_CONFIGS[DEFAULT_DIFFICULTY_KEY] || CHEST_CONFIGS.normal;
    }

    function setTreasureSpritePosition(el, spriteIndex) {
      if (!el) return;
      const safeIndex = Math.max(0, Math.min(15, Number.isFinite(spriteIndex) ? spriteIndex : 0));
      const col = safeIndex % 4;
      const row = Math.floor(safeIndex / 4);
      const pos = value => `${(value / 3) * 100}%`;
      el.style.backgroundPosition = `${pos(col)} ${pos(row)}`;
    }

    function pickRewardTreasure() {
      const decay = TREASURE_DECAY_BY_DIFFICULTY[currentDifficultyKey] ?? TREASURE_DECAY_BY_DIFFICULTY.normal;
      const weights = TREASURE_DATA.map((_, index) => Math.exp(-decay * index));
      const totalWeight = weights.reduce((sum, weight) => sum + weight, 0);
      let roll = Math.random() * totalWeight;
      for (let i = 0; i < TREASURE_DATA.length; i++) {
        roll -= weights[i];
        if (roll <= 0) return TREASURE_DATA[i];
      }
      return TREASURE_DATA[0];
    }

    function getObjectParticle(text) {
      if (!text) return '을';
      const lastHangul = [...text].reverse().find(ch => /[가-힣]/.test(ch));
      if (!lastHangul) return '를';
      const code = lastHangul.charCodeAt(0) - 0xAC00;
      if (code < 0 || code > 11171) return '를';
      return code % 28 === 0 ? '를' : '을';
    }

    function isMonsterAllowedByDifficulty(monster) {
      const config = getCurrentDifficultyConfig();
      const allowedTypes = config.allowedMonsterTypes || ['A', 'B'];
      return allowedTypes.includes(monster.type || 'A');
    }

    function applyDifficultyAttackTime(baseAttackTime) {
      const multiplier = getCurrentDifficultyConfig().attackTimeMultiplier || 1;
      return Math.max(0.1, baseAttackTime * multiplier);
    }

    function applyDifficultySpawnInterval(baseInterval) {
      const multiplier = getCurrentDifficultyConfig().spawnIntervalMultiplier || 1;
      return Math.max(0.25, baseInterval * multiplier);
    }

    function formatPlayTime(seconds) {
      const safeSeconds = Math.max(0, seconds || 0);
      const minutes = Math.floor(safeSeconds / 60);
      const secs = safeSeconds - minutes * 60;
      const secText = secs.toFixed(2).padStart(5, '0');
      return `${String(minutes).padStart(2, '0')}:${secText}`;
    }

    function getBestClearTimeKey(difficultyKey = currentDifficultyKey) {
      return `dungeonDoguriBestClearTime.${difficultyKey}`;
    }

    function getBestClearTime(difficultyKey = currentDifficultyKey) {
      try {
        const stored = window.localStorage.getItem(getBestClearTimeKey(difficultyKey));
        const value = Number(stored);
        return Number.isFinite(value) && value > 0 ? value : null;
      } catch (error) {
        return null;
      }
    }

    function setBestClearTime(seconds, difficultyKey = currentDifficultyKey) {
      try {
        window.localStorage.setItem(getBestClearTimeKey(difficultyKey), String(seconds));
      } catch (error) {
        // 저장소 접근이 막힌 환경에서는 기록 표시만 생략합니다.
      }
    }

    function updateBestClearTime(seconds, difficultyKey = currentDifficultyKey) {
      const current = Math.max(0, seconds || 0);
      const previousBest = getBestClearTime(difficultyKey);
      if (previousBest === null || current < previousBest) {
        setBestClearTime(current, difficultyKey);
        return current;
      }
      return previousBest;
    }

    function updatePlayTimeHud() {
      if (playTimeHud) playTimeHud.textContent = formatPlayTime(elapsed);
    }

    function renderMonsterTable() {
      if (!monsterTable) return;
      monsterTable.innerHTML = MONSTER_DATA.map(m => `
        <div><b>Lv.${m.level}</b><span>${m.name}</span><span>${m.attackTime.toFixed(1)}초</span></div>
      `).join('');
    }

    function renderAlphabetKeyboard() {
      if (!alphaKeyboard) return;
      alphaKeyboard.innerHTML = KEYBOARD_ROWS.map((row, index) => {
        const shieldButton = index === 2
          ? `<button type="button" class="alpha-key shield-key" data-action="shield" aria-label="방어">방어</button>`
          : '';
        const threatButton = index === 2
          ? `<button type="button" class="alpha-key threat-key" data-action="threat" aria-label="위협">위협</button>`
          : '';
        return `
          <div class="alpha-row">
            ${shieldButton}
            ${row.split('').map(key => `<button type="button" class="alpha-key" data-key="${key.toLowerCase()}" aria-label="${key} 입력">${key}</button>`).join('')}
            ${threatButton}
          </div>
        `;
      }).join('');
    }

    function updateActionButtonStates() {
      if (!alphaKeyboard) return;
      const shieldButton = alphaKeyboard.querySelector('.shield-key');
      const shieldEnabled = (gameState === 'playing' || gameState === 'lobby') && player && player.shields > 0;
      if (shieldButton) {
        shieldButton.classList.toggle('disabled', !shieldEnabled);
        shieldButton.disabled = !shieldEnabled;
        shieldButton.textContent = '방어';
      }
    }

    function showInputBubble(char) {
      if (!inputBubble || !char) return;
      inputBubble.textContent = char.toUpperCase();
      inputBubble.classList.remove('show');
      void inputBubble.offsetWidth;
      inputBubble.classList.add('show');
    }

    function handleAlphabetButton(char) {
      if (gameState === 'lobby') {
        animateSword();
        showInputBubble(char);
        return;
      }
      if (gameState !== 'playing') return;
      animateSword();
      typeCharacter(char);
    }

    function playThreat() {
      if (gameState !== 'playing' && gameState !== 'lobby') return;
      animateSword();
      showInputBubble('얍');
    }


    function usePotion() {
      if (gameState !== 'playing') return;
      if (!player || player.potions <= 0) {
        setMessage('사과가 없습니다.');
        updateActionButtonStates();
        return;
      }
      player.potions = Math.max(0, player.potions - 1);
      player.hp = player.maxHp;
      renderHud();
      setMessage('사과 사용! 생명력이 모두 회복되었습니다.');
    }

    function useBestiaryButton() {
      if (gameState !== 'lobby') return;
      // 도감 팝업은 추후 추가 예정입니다.
    }

    function resetGame(startFloor = 1, options = {}) {
      const autoStart = options.autoStart !== false;
      const initialSpawnDelay = Number.isFinite(options.initialSpawnDelay) ? options.initialSpawnDelay : FIRST_MONSTER_SPAWN_DELAY;
      const requestedFloor = Number.isFinite(startFloor) ? startFloor : 1;
      const initialFloor = Math.max(1, Math.min(MAX_FLOOR, Math.floor(requestedFloor)));
      cancelAnimationFrame(animationId);
      clearAllMonsterSpecialTimers();
      player = {
        hp: BASE_MAX_HP,
        maxHp: BASE_MAX_HP,
        shields: BASE_MAX_SHIELDS,
        maxShields: BASE_MAX_SHIELDS,
        potions: 1,
        level: 1,
        exp: 0,
        kills: 0,
      };
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      lastTime = performance.now();
      spawnTimer = initialSpawnDelay;
      nextMonsterId = 1;
      lastSpawnedMonsterKey = null;
      dragonSpawned = false;
      currentFloor = initialFloor;
      floorSpawned = 0;
      floorKills = 0;
      floorFirstBossSpawned = false;
      clearChestSpawned = false;
      pendingRewardTreasure = null;
      stageProgressReady = false;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      gameState = autoStart ? 'playing' : 'transition';
      progressKeyArmed = true;
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      elapsed = 0;
      updatePlayTimeHud();
      lastInputTime = performance.now() / 1000;
      monsterLayer.innerHTML = '';
      clearChestSpawned = false;
      pendingRewardTreasure = null;
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      endOverlay.classList.add('hidden');
      endOverlay.classList.remove('closing');
      if (infoOverlay) {
        infoOverlay.classList.add('hidden');
        infoOverlay.classList.remove('closing');
      }
      if (rewardOverlay) {
        rewardOverlay.classList.add('hidden');
        rewardOverlay.classList.remove('closing');
      }
      startOverlay.classList.add('hidden');
      setCheatControlsVisible(false);
      hideLobbyDifficulty();
      game.classList.remove('is-lobby');
      setFloorMessage();
      clearProfilePain();
      renderHud();
      updateKeyboardHint();
      if (autoStart) loop(lastTime);
    }

    function setProfileImage(src) {
      if (!profileImage || profileImage.getAttribute('src') === src) return;
      profileImage.src = src;
    }

    function updateProfileImage() {
      if (!player || !profileImage || portrait.classList.contains('pain')) return;
      setProfileImage(player.hp <= 1 ? PROFILE_IMAGES.dying : PROFILE_IMAGES.idle);
    }

    function clearProfilePain() {
      if (profilePainTimeout) {
        clearTimeout(profilePainTimeout);
        profilePainTimeout = null;
      }
      portrait.classList.remove('pain');
      updateProfileImage();
    }

    function showProfilePain() {
      if (!profileImage) return;
      if (profilePainTimeout) clearTimeout(profilePainTimeout);
      portrait.classList.add('pain');
      setProfileImage(PROFILE_IMAGES.pain);
      profilePainTimeout = setTimeout(() => {
        profilePainTimeout = null;
        portrait.classList.remove('pain');
        updateProfileImage();
      }, 480);
    }

    function isMobileHeartView() {
      return window.matchMedia('(max-width: 760px)').matches;
    }

    function appendHeartIcon(src, isFull) {
      const heart = document.createElement('img');
      heart.className = `heart-icon ${isFull ? 'full' : 'empty'}`;
      heart.src = src;
      heart.alt = '';
      heart.draggable = false;
      heart.setAttribute('aria-hidden', 'true');
      heartsEl.appendChild(heart);
    }

    function renderHearts() {
      heartsEl.innerHTML = '';
      const useMobileCompactHp = isMobileHeartView() && player.maxHp > MOBILE_HP_VISIBLE_SLOTS;
      const visibleHeartCount = useMobileCompactHp ? MOBILE_HP_VISIBLE_SLOTS : player.maxHp;
      const yellowHeartCount = useMobileCompactHp
        ? Math.min(visibleHeartCount, Math.max(0, player.hp - MOBILE_HP_VISIBLE_SLOTS))
        : 0;
      const redHeartSlots = visibleHeartCount - yellowHeartCount;

      for (let i = 0; i < visibleHeartCount; i++) {
        const isYellowHeart = useMobileCompactHp && i >= redHeartSlots;
        const isFull = isYellowHeart ? true : i < Math.min(player.hp, redHeartSlots);
        appendHeartIcon(isYellowHeart ? HP_YELLOW_IMAGE : HP_RED_IMAGE, isFull);
      }
    }

    function renderHud() {
      renderHearts();

      shieldsEl.innerHTML = '';
      for (let i = 0; i < player.shields; i++) {
        const shield = document.createElement('img');
        shield.className = 'shield-icon full';
        shield.src = 'sp.png';
        shield.alt = '';
        shield.draggable = false;
        shield.setAttribute('aria-hidden', 'true');
        shieldsEl.appendChild(shield);
      }
      guardShield.style.display = player.shields > 0 ? '' : 'none';

      if (gameState === 'lobby') {
        potionIcon.src = 'book.png';
        potionIcon.alt = '도감';
        potionSlot.setAttribute('aria-label', '도감 보기');
        potionHotkey.style.display = '';
        potionSlot.style.display = 'inline-flex';
      } else {
        potionIcon.src = 'apple.png';
        potionIcon.alt = '사과';
        potionSlot.setAttribute('aria-label', '사과 사용');
        potionHotkey.style.display = '';
        potionSlot.style.display = player.potions > 0 ? 'inline-flex' : 'none';
      }

      const need = expNeeded(player.level);
      const pct = Math.min(100, (player.exp / need) * 100);
      levelText.textContent = `도구리 Lv. ${player.level}`;
      expFill.style.width = `${pct}%`;
      expText.textContent = `${player.exp} / ${need}`;
      updateProfileImage();
      if (killCountEl) killCountEl.textContent = player.kills;
      renderStageHud();
      updateActionButtonStates();
    }

    function setMessage(text) {
      messageEl.innerHTML = text;
    }

    function renderStageHud() {
      if (gameState === 'lobby') {
        if (floorText) floorText.textContent = '로비';
        if (floorProgressText) floorProgressText.textContent = '';
        return;
      }

      const config = FLOOR_CONFIGS[currentFloor];
      const total = config ? config.quota : 1;
      const progress = Math.min(100, Math.floor((floorKills / total) * 100));
      if (floorText) floorText.textContent = `지하 ${currentFloor}층`;
      if (floorProgressText) floorProgressText.textContent = `${progress}%`;
    }

    function setFloorMessage() {
      setMessage('<span class="message-line">몬스터 이름을 입력해 처치하세요!</span><span class="message-line"><span class="kbd">Space</span>로 방어하세요!</span>');
    }

    function setLobbyMessage() {
      setMessage('<span class="message-line">난이도를 선택하세요.</span><span class="message-line">1~3 키를 눌러서도 선택할 수 있습니다.</span>');
    }

    function getMonsterDataByLevelAndType(level, type) {
      return MONSTER_DATA.find(monster => monster.level === level && monster.type === type);
    }

    function shouldUseHardVariantLevel(level) {
      return currentDifficultyKey === 'hard' && level >= 11 && level <= 13;
    }

    function getMonsterDataByLevel(level, type = null) {
      if (type) return getMonsterDataByLevelAndType(level, type);
      if (shouldUseHardVariantLevel(level)) {
        return getMonsterDataByLevelAndType(level, 'B') || getMonsterDataByLevelAndType(level, 'A');
      }
      return getMonsterDataByLevelAndType(level, 'A') || MONSTER_DATA.find(monster => monster.level === level);
    }


    function clearMonsterSpecialTimers(monster) {
      if (!monster) return;
      if (monster.veilTimer) {
        clearTimeout(monster.veilTimer);
        monster.veilTimer = null;
      }
    }

    function clearAllMonsterSpecialTimers() {
      if (!Array.isArray(monsters)) return;
      monsters.forEach(clearMonsterSpecialTimers);
    }

    function isVeiledWarlock(monster) {
      return monster && monster.type === 'B' && monster.level === 11;
    }

    function scheduleVeiledWarlockHide(monster) {
      if (!isVeiledWarlock(monster) || !monster.wordEl || !monster.el || monster.el.classList.contains('dead')) return;
      clearMonsterSpecialTimers(monster);
      monster.wordEl.style.transition = 'none';
      monster.wordEl.style.opacity = '1';
      void monster.wordEl.offsetWidth;
      monster.veilTimer = setTimeout(() => {
        if (!isVeiledWarlock(monster) || !monster.wordEl || !monsters.includes(monster)) return;
        monster.wordEl.style.transition = 'opacity 1s linear';
        monster.wordEl.style.opacity = '0';
        monster.veilTimer = null;
      }, 1000);
    }

    function isBoneDragonVariant(monster) {
      return monster && monster.type === 'B' && monster.level === 12;
    }

    function createBoneDragonReturnState(monster) {
      return {
        data: getMonsterDataByLevel(12, 'B'),
        lane: monster.lane,
        progress: monster.progress,
      };
    }

    function swapBoneDragonToFlame(monster) {
      if (!isBoneDragonVariant(monster)) return false;
      const flameData = getMonsterDataByLevel(13, 'B');
      const returnState = createBoneDragonReturnState(monster);
      if (!flameData || !returnState.data) return false;

      const lane = monster.lane;
      const monsterId = monster.id;
      clearMonsterSpecialTimers(monster);
      monsters = monsters.filter(item => item.id !== monsterId);
      if (activeMonsterId === monsterId) activeMonsterId = null;
      inputHintMode = null;
      monster.el.classList.add('jump-away');
      setTimeout(() => monster.el && monster.el.remove(), 380);
      setTimeout(() => {
        if (gameState !== 'playing') return;
        spawnMonster(flameData, lane, {
          temporarySummon: true,
          returnMonster: returnState,
        });
        updateKeyboardHint();
      }, 170);
      renderAllMonsterWords();
      updateKeyboardHint();
      return true;
    }

    function respawnReturnedMonster(returnMonster) {
      if (!returnMonster || gameState !== 'playing') return;
      const data = returnMonster.data || getMonsterDataByLevel(12, 'B');
      if (!data) return;
      spawnMonster(data, returnMonster.lane || 'lane-mid', {
        progress: returnMonster.progress || 0,
        attackTimeOverride: 1,
      });
      updateKeyboardHint();
    }

    function setBlocking(nextState) {
      const canBlock = (gameState === 'playing' || gameState === 'lobby') && player && player.shields > 0;
      isBlocking = !!nextState && canBlock;
      if (!isBlocking) {
        guardShield.classList.remove('block');
        if (shieldBlockTimeout) {
          clearTimeout(shieldBlockTimeout);
          shieldBlockTimeout = null;
        }
      }
      guardShield.classList.toggle('holding', isBlocking);
      updateActionButtonStates();
    }

    function animateShieldBlock() {
      if (shieldBlockTimeout) {
        clearTimeout(shieldBlockTimeout);
        shieldBlockTimeout = null;
      }
      guardShield.classList.remove('block');
      void guardShield.offsetWidth;
      guardShield.classList.add('block');
      shieldBlockTimeout = setTimeout(() => {
        guardShield.classList.remove('block');
        shieldBlockTimeout = null;
      }, 190);
    }


    function animateBlockFeedback() {
      portrait.classList.remove('hit');
      bloodFlash.classList.remove('show', 'blocked');
      game.classList.remove('shake', 'block-shake');
      void portrait.offsetWidth;
      portrait.classList.add('hit');
      bloodFlash.classList.add('blocked', 'show');
      game.classList.add('block-shake');
    }


    function getInputDelta() {
      const now = performance.now() / 1000;
      const delta = lastInputTime == null ? Infinity : now - lastInputTime;
      lastInputTime = now;
      return delta;
    }

    function getResultLabel(delta) {
      if (delta <= INPUT_RESULT_THRESHOLDS.perfect) return { text: 'Perfect', className: 'perfect' };
      if (delta <= INPUT_RESULT_THRESHOLDS.great) return { text: 'Great', className: 'great' };
      if (delta <= INPUT_RESULT_THRESHOLDS.good) return { text: 'Good', className: 'good' };
      return { text: 'Bad', className: 'bad' };
    }

    function showMonsterResult(monster, text, className = '') {
      if (!monster || !monster.resultsEl) return;

      const activeResults = [...monster.resultsEl.querySelectorAll('.monster-result')];
      activeResults.forEach((item, index) => {
        const offset = -(index + 1) * 18;
        item.style.setProperty('--stack-offset', `${offset}px`);
      });

      const resultEl = document.createElement('div');
      resultEl.className = `monster-result ${className}`.trim();
      resultEl.textContent = text;
      resultEl.style.setProperty('--stack-offset', '0px');
      monster.resultsEl.appendChild(resultEl);
      void resultEl.offsetWidth;
      resultEl.classList.add('show');

      setTimeout(() => {
        resultEl.remove();
      }, 1000);
    }

    function showMissOnRelevantMonsters() {
      if (!monsters.length) return;
      const untouched = monsters.every(monster => monster.progress === 0);
      if (untouched) {
        monsters.forEach(monster => showMonsterResult(monster, 'Miss', 'miss'));
        return;
      }
      const target = monsters.find(monster => monster.id === activeMonsterId);
      if (target) showMonsterResult(target, 'Miss', 'miss');
    }

    function applyTypoPenalty(reason) {
      if (gameState !== 'playing') return;

      getInputDelta();

      if (!monsters.length) {
        setMessage(reason);
        return;
      }

      showMissOnRelevantMonsters();

      for (const monster of monsters) {
        if (monster.isTreasureChest) continue;
        monster.remaining = Math.max(0, monster.remaining - TYPO_TIME_PENALTY);
        updateMonsterElement(monster);
      }

      setMessage(`${reason} 모든 몬스터의 공격 준비 시간이 ${TYPO_TIME_PENALTY.toFixed(1)}초 줄었습니다.`);
    }

    function updateKeyboardHint() {
      if (!alphaKeyboard) return;

      const keys = alphaKeyboard.querySelectorAll('.alpha-key');
      keys.forEach(key => key.classList.remove('next-key'));

      if (gameState !== 'playing') return;

      const target = monsters.find(m => m.id === activeMonsterId);
      if (!target) return;

      const nextChar = target.normalized[target.progress];
      if (!nextChar) return;

      const nextKey = alphaKeyboard.querySelector(`.alpha-key[data-key="${nextChar}"]`);
      if (nextKey) nextKey.classList.add('next-key');
    }

    function loop(now) {
      if (gameState !== 'playing') return;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      elapsed += dt;
      updatePlayTimeHud();

      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        trySpawnMonster();
        spawnTimer = getSpawnInterval();
      }

      for (const monster of [...monsters]) {
        if (monster.isTreasureChest) {
          updateMonsterElement(monster);
          continue;
        }
        monster.remaining -= dt;
        if (monster.remaining <= 0) {
          monsterAttack(monster);
        }
        updateMonsterElement(monster);
      }

      animationId = requestAnimationFrame(loop);
    }

    function getSpawnInterval() {
      // 기본 3초에서 시작해서 플레이 시간과 레벨에 따라 조금씩 빨라집니다.
      const speedUp = elapsed * 0.018 + (player.level - 1) * 0.08;
      const baseInterval = Math.max(1.15, 3.0 - speedUp);
      return applyDifficultySpawnInterval(baseInterval);
    }

    function getMonsterSpawnKey(monster) {
      if (!monster) return '';
      return `${monster.type || 'A'}:${monster.level}:${monster.name}`;
    }

    function pickMonsterAvoidingPrevious(candidates) {
      if (!candidates.length) return null;
      const filtered = candidates.filter(monster => getMonsterSpawnKey(monster) !== lastSpawnedMonsterKey);
      const pool = filtered.length ? filtered : candidates;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function getRandomMonsterData() {
      const config = FLOOR_CONFIGS[currentFloor];
      if (!config) return MONSTER_DATA[0];

      const bossSpawnNumber = config.bossSpawnNumber || 1;
      const isBossSpawnTurn = floorSpawned + 1 >= bossSpawnNumber;
      if (config.firstBossLevel && !floorFirstBossSpawned && isBossSpawnTurn) {
        return getMonsterDataByLevel(config.firstBossLevel);
      }

      const candidates = MONSTER_DATA.filter(monster =>
        config.levels.includes(monster.level)
        && monster.normalSpawn !== false
        && isMonsterAllowedByDifficulty(monster)
      );
      return pickMonsterAvoidingPrevious(candidates);
    }

    function getSpawnLaneForData(data) {
      const config = FLOOR_CONFIGS[currentFloor];
      const usedLanes = new Set(monsters.map(monster => monster.lane));
      const freeLanes = LANES.filter(lane => !usedLanes.has(lane));
      if (!freeLanes.length) return null;

      if (config && config.firstBossLevel === data.level && !floorFirstBossSpawned && freeLanes.includes('lane-mid')) {
        return 'lane-mid';
      }

      return freeLanes[Math.floor(Math.random() * freeLanes.length)];
    }

    function trySpawnMonster() {
      const config = FLOOR_CONFIGS[currentFloor];
      if (!config) return;

      if (config.waveMode === 'fireDragon') {
        trySpawnFloor6Wave();
        return;
      }

      if (monsters.length >= MAX_MONSTERS) return;
      if (floorSpawned >= config.quota) return;

      const data = getRandomMonsterData();
      if (!data) return;

      const lane = getSpawnLaneForData(data);
      if (!lane) return;

      spawnMonster(data, lane);
      floorSpawned += 1;

      if (config.firstBossLevel === data.level && !floorFirstBossSpawned) {
        floorFirstBossSpawned = true;
      }
    }

    function trySpawnFloor6Wave() {
      if (currentFloor !== 6) return;
      if (monsters.length > 0) return;

      const fireData = getMonsterDataByLevel(13);
      const dragonData = getMonsterDataByLevel(12);
      if (!fireData || !dragonData) return;

      if (floorSpawned === 0) {
        spawnMonster(fireData, 'lane-left');
        spawnMonster(fireData, 'lane-mid');
        spawnMonster(fireData, 'lane-right');
        floorSpawned = 3;
        return;
      }

      if (floorSpawned === 3 && floorKills >= 3) {
        spawnMonster(fireData, 'lane-left');
        spawnMonster(dragonData, 'lane-mid');
        spawnMonster(fireData, 'lane-right');
        floorSpawned = 6;
        floorFirstBossSpawned = true;
      }
    }

    function spawnMonster(data, lane, options = {}) {
      if (data.name === 'Ancient Red Dragon' || data.name === 'Ancient Bone Dragon') {
        dragonSpawned = true;
      }

      const adjustedAttackTime = Number.isFinite(options.attackTimeOverride)
        ? Math.max(0.1, options.attackTimeOverride)
        : applyDifficultyAttackTime(data.attackTime);
      const monster = {
        id: nextMonsterId++,
        level: data.level,
        name: data.name,
        normalized: normalizeName(data.name),
        attackTime: adjustedAttackTime,
        remaining: adjustedAttackTime,
        progress: Math.max(0, Math.min(normalizeName(data.name).length, options.progress || 0)),
        type: data.type || 'A',
        spriteSheet: data.spriteSheet || MONSTER_SPRITE_A,
        lane,
        temporarySummon: !!options.temporarySummon,
        returnMonster: options.returnMonster || null,
        isTreasureChest: !!options.treasureChest || !!data.isTreasureChest,
        chestConfig: options.chestConfig || data.chestConfig || null,
        veilTimer: null,
      };

      const dataSpriteIndex = Number.isFinite(data.spriteIndex) ? data.spriteIndex : data.level - 1;
      const spriteIndex = Math.max(0, Math.min(15, dataSpriteIndex));
      const spriteCol = spriteIndex % 4;
      const spriteRow = Math.floor(spriteIndex / 4);
      const spritePosition = value => `${(value / 3) * 100}%`;

      const el = document.createElement('div');
      const levelClass = data.level <= 3 && !monster.isTreasureChest ? 'level-low' : '';
      const showLethalSkull = data.level === 12 && currentDifficultyKey !== 'easy' && !monster.isTreasureChest;
      el.className = `monster ${levelClass} ${showLethalSkull ? 'lethal-warning' : ''} ${monster.isTreasureChest ? 'treasure-chest' : ''} ${lane}`;
      el.dataset.id = monster.id;
      el.style.setProperty('--monster-sprite-x', spritePosition(spriteCol));
      el.style.setProperty('--monster-sprite-y', spritePosition(spriteRow));
      el.style.setProperty('--monster-sprite-image', `url('${monster.spriteSheet}')`);
      el.innerHTML = `
        ${showLethalSkull ? '<img class="lethal-skull" src="skull.png" alt="" draggable="false" aria-hidden="true" />' : ''}
        <div class="nameplate">
          <div class="monster-results"></div>
          <div class="word"></div>
          <div class="timer-ring" data-time="${Math.max(0, Math.ceil(monster.remaining))}"></div>
        </div>
        <div class="monster-body">
          <div class="monster-hit-slash"></div>
          <div class="defeat-burst" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="enemy-lv">Lv.${monster.level}</div>
        </div>
      `;
      monster.el = el;
      monster.wordEl = el.querySelector('.word');
      monster.resultsEl = el.querySelector('.monster-results');
      monster.timerEl = el.querySelector('.timer-ring');
      monsterLayer.appendChild(el);
      monsters.push(monster);
      if (!monster.temporarySummon) lastSpawnedMonsterKey = getMonsterSpawnKey(monster);
      renderMonsterWord(monster);
      updateMonsterElement(monster);
      if (isVeiledWarlock(monster)) scheduleVeiledWarlockHide(monster);
      return monster;
    }

    function shouldHighlightNeededChar(monster, normalizedIndex) {
      if (normalizedIndex < monster.progress) return false;

      if (inputHintMode && inputHintMode.type === 'active-next') {
        return monster.id === inputHintMode.monsterId && normalizedIndex === monster.progress;
      }

      if (inputHintMode && inputHintMode.type === 'all-first') {
        return normalizedIndex === 0;
      }

      return false;
    }

    function renderAllMonsterWords() {
      monsters.forEach(monster => renderMonsterWord(monster));
    }

    function setInputHintMode(mode) {
      inputHintMode = mode;
      renderAllMonsterWords();
    }

    function clearInputHintMode() {
      inputHintMode = null;
      renderAllMonsterWords();
    }

    function renderMonsterWord(monster) {
      let normalizedIndex = 0;
      let html = '';
      for (const ch of monster.name) {
        if (ch === ' ') {
          const done = monster.progress > normalizedIndex;
          html += `<span class="space ${done ? 'done' : ''}">&nbsp;</span>`;
        } else {
          const done = normalizedIndex < monster.progress;
          const needInput = shouldHighlightNeededChar(monster, normalizedIndex);
          const classes = [done ? 'done' : '', needInput ? 'need-input' : ''].filter(Boolean).join(' ');
          html += `<span class="${classes}">${ch}</span>`;
          normalizedIndex++;
        }
      }
      monster.wordEl.innerHTML = html;
    }

    function updateMonsterElement(monster) {
      if (monster.isTreasureChest) {
        if (monster.timerEl) monster.timerEl.dataset.time = '';
        monster.el.classList.toggle('active', monster.id === activeMonsterId);
        return;
      }
      const ratio = Math.max(0, Math.min(1, monster.remaining / monster.attackTime));
      const used = 1 - ratio;
      const deg = used * 360;
      const dangerColor = used > .72 ? '#ff5a6d' : used > .45 ? '#ffd166' : '#68e0a8';
      monster.timerEl.style.background = `conic-gradient(${dangerColor} ${deg}deg, rgba(255,255,255,.13) ${deg}deg)`;
      monster.timerEl.dataset.time = String(Math.max(0, Math.ceil(monster.remaining)));
      monster.el.classList.toggle('active', monster.id === activeMonsterId);
    }

    function setMonsterLane(monster, lane) {
      if (!monster || !monster.el || !lane || monster.lane === lane) return;
      LANES.forEach(laneClass => monster.el.classList.remove(laneClass));
      monster.lane = lane;
      monster.el.classList.add(lane);
    }

    function swapLevel11MonsterLane(monster) {
      if (!monster || monster.level !== 11 || !LANES.includes(monster.lane)) return;

      const nextLanes = LANES.filter(lane => lane !== monster.lane);
      if (!nextLanes.length) return;

      const nextLane = nextLanes[Math.floor(Math.random() * nextLanes.length)];
      const previousLane = monster.lane;
      const otherMonster = monsters.find(item => item.id !== monster.id && item.lane === nextLane);

      setMonsterLane(monster, nextLane);
      if (otherMonster) setMonsterLane(otherMonster, previousLane);
    }

    function monsterAttack(monster) {
      monster.remaining = monster.attackTime;
      monster.el.classList.remove('attack');
      void monster.el.offsetWidth;
      monster.el.classList.add('attack');
      if (isVeiledWarlock(monster)) scheduleVeiledWarlockHide(monster);

      if (isBlocking && player.shields > 0) {
        player.shields = Math.max(0, player.shields - 1);
        renderHud();
        animateShieldBlock();
        animateBlockFeedback();
        setMessage(`${monster.name}의 공격을 방어했습니다!`);
        if (player.shields <= 0) setBlocking(false);
        return;
      }

      if (monster.level === 12 && currentDifficultyKey !== 'easy') {
        damageDoguri(`${monster.name}의 치명적인 공격!`, player.hp);
        return;
      }

      damageDoguri(`${monster.name}의 공격!`);
    }


    function showEndOverlay() {
      if (!endOverlay) return;
      endOverlay.classList.remove('closing');
      endOverlay.classList.remove('hidden');
    }

    function hideEndOverlay(onClosed) {
      if (!endOverlay || endOverlay.classList.contains('hidden')) {
        if (typeof onClosed === 'function') onClosed();
        return;
      }

      if (endOverlay.classList.contains('closing')) return;
      endOverlay.classList.add('closing');
      window.setTimeout(() => {
        endOverlay.classList.add('hidden');
        endOverlay.classList.remove('closing');
        if (typeof onClosed === 'function') onClosed();
      }, POPUP_CLOSE_MS);
    }

    function showInfoOverlay() {
      if (!infoOverlay) return;
      infoOverlay.classList.remove('closing');
      infoOverlay.classList.remove('hidden');
    }

    function hideInfoOverlay(onClosed) {
      if (!infoOverlay || infoOverlay.classList.contains('hidden')) {
        if (typeof onClosed === 'function') onClosed();
        return;
      }

      if (infoOverlay.classList.contains('closing')) return;
      infoOverlay.classList.add('closing');
      window.setTimeout(() => {
        infoOverlay.classList.add('hidden');
        infoOverlay.classList.remove('closing');
        if (typeof onClosed === 'function') onClosed();
      }, POPUP_CLOSE_MS);
    }

    function isInfoOverlayOpen() {
      return !!(infoOverlay && !infoOverlay.classList.contains('hidden'));
    }

    function runSceneFade(onBlack, onAfterFadeOut) {
      if (!screenFade || isSceneTransitioning) return;
      isSceneTransitioning = true;
      screenFade.classList.add('show');
      window.setTimeout(() => {
        if (typeof onBlack === 'function') onBlack();
        requestAnimationFrame(() => {
          screenFade.classList.remove('show');
          window.setTimeout(() => {
            isSceneTransitioning = false;
            if (typeof onAfterFadeOut === 'function') onAfterFadeOut();
          }, SCENE_FADE_OUT_MS);
        });
      }, SCENE_FADE_IN_MS);
    }

    function beginPreparedGame() {
      if (gameState !== 'transition') return;
      gameState = 'playing';
      lastTime = performance.now();
      elapsed = 0;
      updatePlayTimeHud();
      updateKeyboardHint();
      loop(lastTime);
    }

    function hideLobbyDifficulty() {
      if (lobbyDifficultyLayer) lobbyDifficultyLayer.classList.add('hidden');
    }

    function showLobbyDifficulty() {
      if (!lobbyDifficultyLayer) return;
      lobbyDifficultyLayer.classList.remove('hidden');
      updateLobbyDifficultyLayout();
    }

    function updateLobbyDifficultyLayout() {
      if (!lobbyDifficultyLayer || !dungeonEl) return;

      const dungeonRect = dungeonEl.getBoundingClientRect();
      const gameRect = game.getBoundingClientRect();
      const naturalWidth = lobbyBgImage.naturalWidth || LOBBY_BG_FALLBACK_WIDTH;
      const naturalHeight = lobbyBgImage.naturalHeight || Math.max(1, dungeonRect.height);
      const bgScale = Math.max(dungeonRect.width / naturalWidth, dungeonRect.height / naturalHeight);
      const renderedBgWidth = naturalWidth * bgScale;
      const renderedBgHeight = naturalHeight * bgScale;
      const bgLeft = (dungeonRect.left - gameRect.left) + (dungeonRect.width - renderedBgWidth) / 2;
      const bgTop = (dungeonRect.top - gameRect.top) + (dungeonRect.height - renderedBgHeight);

      lobbyDifficultyLayer.style.left = `${bgLeft}px`;
      lobbyDifficultyLayer.style.top = `${bgTop}px`;
      lobbyDifficultyLayer.style.width = `${renderedBgWidth}px`;
      lobbyDifficultyLayer.style.height = `${renderedBgHeight}px`;
      lobbyDifficultyLayer.style.setProperty('--lobby-bg-scale', bgScale);
      lobbyDifficultyLayer.style.setProperty('--lobby-button-width-scaled', `${LOBBY_BUTTON_CONFIG.width * bgScale}px`);
      lobbyDifficultyLayer.style.setProperty('--lobby-button-height-scaled', `${LOBBY_BUTTON_CONFIG.height * bgScale}px`);
      lobbyDifficultyLayer.style.setProperty('--lobby-button-gap', `${LOBBY_BUTTON_CONFIG.gap * bgScale}px`);
      lobbyDifficultyLayer.style.setProperty('--lobby-button-offset-y', `${LOBBY_BUTTON_CONFIG.offsetY * bgScale}px`);
      lobbyDifficultyLayer.style.setProperty('--lobby-button-center-x', `${LOBBY_BUTTON_CONFIG.centerX * 100}%`);
      lobbyDifficultyLayer.style.setProperty('--lobby-button-center-y', `${LOBBY_BUTTON_CONFIG.centerY * 100}%`);
      lobbyDifficultyLayer.style.setProperty('--lobby-info-size-scaled', `${LOBBY_INFO_BUTTON_CONFIG.size * bgScale}px`);
      lobbyDifficultyLayer.style.setProperty('--lobby-info-offset-y', `${LOBBY_INFO_BUTTON_CONFIG.offsetY * bgScale}px`);
      lobbyDifficultyLayer.style.setProperty('--lobby-info-center-x', `${LOBBY_INFO_BUTTON_CONFIG.centerX * 100}%`);
      lobbyDifficultyLayer.style.setProperty('--lobby-info-center-y', `${LOBBY_INFO_BUTTON_CONFIG.centerY * 100}%`);
    }

    function setupLobby() {
      cancelAnimationFrame(animationId);
      clearAllMonsterSpecialTimers();
      gameState = 'lobby';
      progressKeyArmed = true;
      stageProgressReady = false;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      monsterLayer.innerHTML = '';
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      endOverlay.classList.add('hidden');
      endOverlay.classList.remove('closing');
      if (infoOverlay) {
        infoOverlay.classList.add('hidden');
        infoOverlay.classList.remove('closing');
      }
      if (rewardOverlay) {
        rewardOverlay.classList.add('hidden');
        rewardOverlay.classList.remove('closing');
      }
      startOverlay.classList.add('hidden');
      setCheatControlsVisible(true);
      game.classList.add('is-lobby');
      currentFloor = 1;
      floorSpawned = 0;
      floorKills = 0;
      floorFirstBossSpawned = false;
      clearChestSpawned = false;
      pendingRewardTreasure = null;
      player = {
        hp: BASE_MAX_HP,
        maxHp: BASE_MAX_HP,
        shields: BASE_MAX_SHIELDS,
        maxShields: BASE_MAX_SHIELDS,
        potions: 1,
        level: 1,
        exp: 0,
        kills: 0,
      };
      elapsed = 0;
      updatePlayTimeHud();
      renderStageHud();
      renderHud();
      clearProfilePain();
      setLobbyMessage();
      showLobbyDifficulty();
      updateKeyboardHint();
    }

    function enterLobby() {
      if (isSceneTransitioning) return;
      runSceneFade(() => setupLobby());
    }

    function startDifficultyGame(difficultyKey = DEFAULT_DIFFICULTY_KEY) {
      if (isSceneTransitioning || gameState !== 'lobby' || isInfoOverlayOpen()) return;
      setCurrentDifficulty(difficultyKey);
      clearLobbyButtonPress();
      runSceneFade(() => {
        hideLobbyDifficulty();
        game.classList.remove('is-lobby');
        const startFloor = cheatCodeEnabled ? selectedCheatFloor : 1;
        resetGame(startFloor, { autoStart: false, initialSpawnDelay: FIRST_MONSTER_SPAWN_DELAY });
      }, () => beginPreparedGame());
    }

    function goToStart(options = {}) {
      const shouldAnimatePopupClose = options.animatePopupClose !== false && endOverlay && !endOverlay.classList.contains('hidden');
      if (shouldAnimatePopupClose) {
        hideEndOverlay(() => goToStart({ animatePopupClose: false }));
        return;
      }

      cancelAnimationFrame(animationId);
      clearAllMonsterSpecialTimers();
      gameState = 'start';
      progressKeyArmed = true;
      stageProgressReady = false;
      clearChestSpawned = false;
      pendingRewardTreasure = null;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      monsterLayer.innerHTML = '';
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      if (endOverlay) {
        endOverlay.classList.add('hidden');
        endOverlay.classList.remove('closing');
      }
      if (infoOverlay) {
        infoOverlay.classList.add('hidden');
        infoOverlay.classList.remove('closing');
      }
      if (rewardOverlay) {
        rewardOverlay.classList.add('hidden');
        rewardOverlay.classList.remove('closing');
      }
      hideLobbyDifficulty();
      game.classList.remove('is-lobby');
      startOverlay.classList.remove('hidden');
      setCheatControlsVisible(true);
      restartButton.textContent = '다시 도전';
      if (homeHintKbd) homeHintKbd.textContent = 'ESC';
      clearProfilePain();
      updateKeyboardHint();
      lastInputTime = null;
      setMessage('<span class="message-line">몬스터 이름을 입력해 처치하세요!</span><span class="message-line"><span class="kbd">Space</span>로 방어하세요!</span>');
    }


    function updateCheatFloorButtons() {
      if (!cheatFloorPanel) return;
      cheatFloorPanel.querySelectorAll('.cheat-floor-button').forEach(button => {
        const floor = Number(button.dataset.floor);
        const isActive = floor === selectedCheatFloor;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });
    }

    function setSelectedCheatFloor(floor) {
      const safeFloor = Number.isInteger(floor) ? floor : 1;
      selectedCheatFloor = Math.max(1, Math.min(MAX_FLOOR, safeFloor));
      updateCheatFloorButtons();
    }

    function setCheatControlsVisible(isVisible) {
      if (!cheatControls) return;
      cheatControls.classList.toggle('hidden', !isVisible);
    }

    function updateCheatToggle() {
      if (cheatToggle) {
        cheatToggle.classList.toggle('active', cheatCodeEnabled);
        cheatToggle.classList.toggle('hidden', cheatCodeEnabled);
        cheatToggle.setAttribute('aria-pressed', String(cheatCodeEnabled));
        cheatToggle.textContent = cheatCodeEnabled ? '치트 ON' : '치트 OFF';
      }
      if (cheatFloorPanel) cheatFloorPanel.classList.toggle('hidden', !cheatCodeEnabled);
      updateCheatFloorButtons();
    }

    function restartGameWithFade() {
      if (isSceneTransitioning) return;
      hideEndOverlay(() => {
        runSceneFade(() => {
          resetGame(1, { autoStart: false, initialSpawnDelay: FIRST_MONSTER_SPAWN_DELAY });
        }, () => beginPreparedGame());
      });
    }

    function pressProgressButton() {
      if (!progressKeyArmed) return false;

      if (!startOverlay.classList.contains('hidden')) {
        enterLobby();
        return true;
      }
      if (!endOverlay.classList.contains('hidden')) {
        if (gameState === 'stageclear') {
          if (!stageProgressReady) return false;
          startNextFloor();
        } else if (gameState === 'clear') {
          goToStart();
        } else {
          restartGameWithFade();
        }
        return true;
      }
      return false;
    }

    function pressLobbyDifficultyHotkey(key) {
      if (!lobbyDifficultyButtons) return false;
      const button = lobbyDifficultyButtons.querySelector(`.lobby-difficulty-button[data-hotkey="${key}"]`);
      if (!button) return false;
      button.classList.add('pressed');
      window.setTimeout(() => button.classList.remove('pressed'), 140);
      startDifficultyGame(button.dataset.difficulty);
      return true;
    }

    function handleKeydown(e) {
      if (gameState !== 'playing') {
        if (isSceneTransitioning) {
          e.preventDefault();
          return;
        }
        const startScreenVisible = !startOverlay.classList.contains('hidden');
        const endScreenVisible = !endOverlay.classList.contains('hidden');

        if (isRewardOverlayOpen()) {
          e.preventDefault();
          if (e.key === 'Escape' || e.key === ' ' || e.key === 'Enter') closeRewardAndShowClear();
          return;
        }

        if (isInfoOverlayOpen()) {
          e.preventDefault();
          if (e.key === 'Escape' || e.key === ' ' || e.key === 'Enter') hideInfoOverlay();
          return;
        }

        if (gameState === 'lobby' && /^[1-3]$/.test(e.key)) {
          e.preventDefault();
          pressLobbyDifficultyHotkey(e.key);
          return;
        }

        if ((startScreenVisible || gameState === 'lobby') && cheatCodeEnabled && /^[1-6]$/.test(e.key)) {
          e.preventDefault();
          setSelectedCheatFloor(Number(e.key));
          return;
        }

        if (gameState === 'lobby' && e.key === ' ') {
          e.preventDefault();
          if (e.repeat) return;
          setBlocking(true);
          return;
        }

        if (gameState === 'lobby' && e.key === 'Control') {
          e.preventDefault();
          if (e.repeat) return;
          useBestiaryButton();
          return;
        }

        if (gameState === 'lobby' && e.key === 'Alt') {
          e.preventDefault();
          if (e.repeat) return;
          playThreat();
          return;
        }

        if (gameState === 'lobby' && e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) {
          e.preventDefault();
          animateSword();
          showInputBubble(e.key);
          return;
        }

        if (endScreenVisible && e.key === 'Escape' && gameState !== 'stageclear') {
          e.preventDefault();
          goToStart();
          return;
        }

        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          pressProgressButton();
        }
        return;
      }

      if (e.key === ' ') {
        e.preventDefault();
        if (e.repeat) return;
        if (player.shields <= 0) {
          setMessage('방패 능력이 없어 방어할 수 없습니다.');
          return;
        }
        setBlocking(true);
        return;
      }

      if (e.key === 'Control') {
        e.preventDefault();
        if (e.repeat) return;
        usePotion();
        return;
      }

      if (e.key === 'Alt') {
        e.preventDefault();
        if (e.repeat) return;
        playThreat();
        return;
      }

      if (e.key.length !== 1) return;
      const char = e.key.toLowerCase();
      if (!/^[a-z]$/.test(char)) return;
      e.preventDefault();

      animateSword();
      typeCharacter(char);
    }

    function handleKeyup(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        progressKeyArmed = true;
      }

      if (e.key === 'Control' || e.key === 'Escape') {
        e.preventDefault();
      }

      if (gameState === 'lobby' && e.key === ' ') {
        e.preventDefault();
        setBlocking(false);
        return;
      }

      if (gameState !== 'playing') return;

      if (e.key === ' ') {
        e.preventDefault();
        setBlocking(false);
      }
    }

    function typeCharacter(char) {
      showInputBubble(char);
      if (!monsters.length) {
        applyTypoPenalty('허공을 베었습니다. 아직 몬스터가 없습니다!');
        updateKeyboardHint();
        return;
      }

      let target = monsters.find(m => m.id === activeMonsterId);
      if (target && target.normalized[target.progress] !== char) {
        setInputHintMode({ type: 'active-next', monsterId: target.id });
        applyTypoPenalty(`오타! ${target.name}의 다음 글자는 “${target.normalized[target.progress].toUpperCase()}”입니다.`);
        updateKeyboardHint();
        return;
      }

      if (!target) {
        const matching = monsters
          .filter(m => m.normalized[m.progress] === char)
          .sort((a, b) => a.remaining - b.remaining || b.progress - a.progress);
        target = matching[0];
        if (!target) {
          setInputHintMode({ type: 'all-first' });
          applyTypoPenalty('오타! 몬스터 이름과 맞지 않습니다.');
          updateKeyboardHint();
          return;
        }
        activeMonsterId = target.id;
      }

      inputHintMode = null;
      const inputDelta = getInputDelta();
      const inputResult = getResultLabel(inputDelta);
      target.progress += 1;
      animateMonsterHit(target);
      showMonsterResult(target, inputResult.text, inputResult.className);
      renderAllMonsterWords();
      updateMonsterElement(target);

      if (isBoneDragonVariant(target) && target.progress < target.normalized.length) {
        swapBoneDragonToFlame(target);
        return;
      }

      if (target.level === 11 && target.type !== 'B' && target.progress < target.normalized.length) {
        swapLevel11MonsterLane(target);
      }

      updateKeyboardHint();

      if (target.progress >= target.normalized.length) {
        killMonster(target);
      }
    }

    function killMonster(monster) {
      clearMonsterSpecialTimers(monster);

      if (monster.isTreasureChest) {
        openTreasureChest(monster);
        return;
      }

      if (monster.temporarySummon) {
        const returnMonster = monster.returnMonster;
        setMessage(`${monster.name} 처치!`);
        monster.el.classList.add('dead');
        monsters = monsters.filter(m => m.id !== monster.id);
        if (activeMonsterId === monster.id) activeMonsterId = null;
        inputHintMode = null;
        renderAllMonsterWords();
        updateKeyboardHint();
        setTimeout(() => monster.el.remove(), MONSTER_DEFEAT_REMOVE_DELAY_MS);
        setTimeout(() => respawnReturnedMonster(returnMonster), MONSTER_DEFEAT_REMOVE_DELAY_MS);
        return;
      }

      player.kills += 1;
      floorKills += 1;
      const gained = expReward(monster.level);
      if (gained > 0) player.exp += gained;
      setMessage(`${monster.name} 처치!`);
      renderStageHud();

      monster.el.classList.add('dead');
      monsters = monsters.filter(m => m.id !== monster.id);
      if (activeMonsterId === monster.id) activeMonsterId = null;
      inputHintMode = null;
      renderAllMonsterWords();
      updateKeyboardHint();
      setTimeout(() => monster.el.remove(), MONSTER_DEFEAT_REMOVE_DELAY_MS);

      while (player.exp >= expNeeded(player.level) && player.level < 12) {
        player.exp -= expNeeded(player.level);
        player.level += 1;
        const hpIncreased = player.maxHp < MAX_PLAYER_HP;
        if (hpIncreased) player.maxHp = Math.min(MAX_PLAYER_HP, player.maxHp + 1);
        player.hp = player.maxHp;
        showToast('레벨업!');
        setMessage(hpIncreased
          ? `레벨 업! 도구리 Lv. ${player.level}. 최대 생명력 +1, 생명력이 모두 회복되었습니다.`
          : `레벨 업! 도구리 Lv. ${player.level}. 생명력이 모두 회복되었습니다.`);
      }
      renderHud();
      if (currentFloor === 6) trySpawnFloor6Wave();
      scheduleFloorClearCheck();
    }

    function scheduleFloorClearCheck() {
      setTimeout(() => {
        checkFloorClear();
      }, MONSTER_DEFEAT_REMOVE_DELAY_MS);
    }

    function checkFloorClear() {
      const config = FLOOR_CONFIGS[currentFloor];
      if (!config || gameState !== 'playing') return;
      if (floorKills >= config.quota && floorSpawned >= config.quota && monsters.length === 0) {
        if (currentFloor >= MAX_FLOOR) {
          spawnClearChest();
        } else {
          stageClear();
        }
      }
    }

    function spawnClearChest() {
      if (clearChestSpawned || gameState !== 'playing') return;
      const chestConfig = getChestConfigForDifficulty();
      clearChestSpawned = true;
      setBlocking(false);
      activeMonsterId = null;
      inputHintMode = null;
      spawnTimer = 999999;
      const chestData = {
        type: 'Chest',
        level: 14,
        name: chestConfig.name,
        attackTime: 999999,
        spriteSheet: MONSTER_SPRITE_A,
        spriteIndex: chestConfig.spriteIndex,
        isTreasureChest: true,
        chestConfig,
      };
      spawnMonster(chestData, 'lane-mid', {
        treasureChest: true,
        chestConfig,
        attackTimeOverride: 999999,
      });
      setMessage(`<span class="message-line">${chestConfig.name}가 나타났습니다!</span><span class="message-line">이름을 입력해 보물상자를 여세요.</span>`);
      updateKeyboardHint();
    }

    function openTreasureChest(chest) {
      if (!chest || !chest.isTreasureChest || chest.chestOpened) return;
      const chestConfig = chest.chestConfig || getChestConfigForDifficulty();
      chest.chestOpened = true;
      chest.progress = chest.normalized.length;
      activeMonsterId = null;
      inputHintMode = null;
      pendingRewardTreasure = pickRewardTreasure();
      cancelAnimationFrame(animationId);
      gameState = 'rewardpending';
      setBlocking(false);
      chest.spriteSheet = MONSTER_SPRITE_B;
      if (chest.el) {
        chest.el.style.setProperty('--monster-sprite-image', `url('${MONSTER_SPRITE_B}')`);
        chest.el.classList.remove('hit');
        void chest.el.offsetWidth;
        chest.el.classList.add('chest-opened');
      }
      renderMonsterWord(chest);
      updateKeyboardHint();
      setMessage(`${chestConfig.name} 오픈!`);
      setTimeout(() => {
        if (gameState === 'rewardpending') showRewardOverlay(pendingRewardTreasure);
      }, 1000);
    }

    function showRewardOverlay(treasure) {
      if (!rewardOverlay || !treasure) return;
      gameState = 'reward';
      setTreasureSpritePosition(rewardTreasureImage, treasure.spriteIndex);
      const particle = getObjectParticle(treasure.name);
      if (rewardDesc) rewardDesc.textContent = `${treasure.name}${particle} 획득했습니다.`;
      rewardOverlay.classList.remove('closing');
      rewardOverlay.classList.remove('hidden');
    }

    function hideRewardOverlay(onClosed) {
      if (!rewardOverlay || rewardOverlay.classList.contains('hidden')) {
        if (typeof onClosed === 'function') onClosed();
        return;
      }
      if (rewardOverlay.classList.contains('closing')) return;
      rewardOverlay.classList.add('closing');
      window.setTimeout(() => {
        rewardOverlay.classList.add('hidden');
        rewardOverlay.classList.remove('closing');
        if (typeof onClosed === 'function') onClosed();
      }, POPUP_CLOSE_MS);
    }

    function isRewardOverlayOpen() {
      return !!(rewardOverlay && !rewardOverlay.classList.contains('hidden'));
    }

    function closeRewardAndShowClear() {
      if (isSceneTransitioning || !isRewardOverlayOpen()) return;
      hideRewardOverlay(() => {
        pendingRewardTreasure = null;
        winGame();
      });
    }

    function stageClear() {
      gameState = 'stageclear';
      setBlocking(false);
      stageProgressReady = false;
      if (stageProgressDelayTimeout) clearTimeout(stageProgressDelayTimeout);
      stageProgressDelayTimeout = setTimeout(() => {
        stageProgressReady = true;
        stageProgressDelayTimeout = null;
      }, 500);
      cancelAnimationFrame(animationId);
      setCheatControlsVisible(false);
      endTitle.textContent = `지하 ${currentFloor}층 클리어!`;
      endDesc.innerHTML = `지하 ${currentFloor}층의 몬스터를 모두 처치했습니다.<br /><b>Space</b>를 누르면 지하 ${currentFloor + 1}층으로 이동합니다.`;
      restartButton.textContent = '다음 층';
      const restartActionCol = restartButton.closest('.end-action-col');
      if (restartActionCol) restartActionCol.style.display = 'flex';
      const homeActionCol = homeButton.closest('.end-action-col');
      if (homeActionCol) homeActionCol.style.display = 'none';
      showEndOverlay();
      updateKeyboardHint();
    }

    function prepareNextFloor() {
      currentFloor += 1;
      clearAllMonsterSpecialTimers();
      floorSpawned = 0;
      floorKills = 0;
      floorFirstBossSpawned = false;
      clearChestSpawned = false;
      pendingRewardTreasure = null;
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      monsterLayer.innerHTML = '';
      spawnTimer = FIRST_MONSTER_SPAWN_DELAY;
      lastTime = performance.now();
      gameState = 'transition';
      progressKeyArmed = true;
      stageProgressReady = false;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      endOverlay.classList.add('hidden');
      endOverlay.classList.remove('closing');
      setFloorMessage();
      renderStageHud();
      updatePlayTimeHud();
      updateKeyboardHint();
      updateActionButtonStates();
    }

    function beginPreparedFloor() {
      if (gameState !== 'transition') return;
      gameState = 'playing';
      lastTime = performance.now();
      updatePlayTimeHud();
      updateKeyboardHint();
      loop(lastTime);
    }

    function startNextFloor() {
      if (isSceneTransitioning || gameState !== 'stageclear') return;
      runSceneFade(() => {
        prepareNextFloor();
      }, () => beginPreparedFloor());
    }

    function damageDoguri(reason, amount = 1) {
      if (gameState !== 'playing') return;
      player.hp = Math.max(0, player.hp - amount);
      renderHud();
      setMessage(reason);

      portrait.classList.remove('hit');
      bloodFlash.classList.remove('show', 'blocked');
      game.classList.remove('shake', 'block-shake');
      void portrait.offsetWidth;
      portrait.classList.add('hit');
      showProfilePain();
      bloodFlash.classList.add('show');
      game.classList.add('shake');

      if (player.hp <= 0) {
        gameOver();
      }
    }

    function animateSword() {
      sword.classList.remove('slash');
      void sword.offsetWidth;
      sword.classList.add('slash');
    }

    function animateMonsterHit(monster) {
      if (!monster || !monster.el) return;
      const offsetX = Math.round((Math.random() * 36) - 18);
      const offsetY = Math.round((Math.random() * 28) - 14);
      const rotate = Math.round((Math.random() * 14) - 7);
      monster.el.style.setProperty('--slash-offset-x', `${offsetX}px`);
      monster.el.style.setProperty('--slash-offset-y', `${offsetY}px`);
      monster.el.style.setProperty('--slash-rotate', `${rotate}deg`);
      monster.el.classList.remove('hit');
      void monster.el.offsetWidth;
      monster.el.classList.add('hit');
    }

    function showToast(text) {
      comboToast.textContent = text;
      comboToast.classList.remove('show');
      void comboToast.offsetWidth;
      comboToast.classList.add('show');
    }

    function gameOver() {
      gameState = 'gameover';
      setBlocking(false);
      clearAllMonsterSpecialTimers();
      if (profilePainTimeout) {
        clearTimeout(profilePainTimeout);
        profilePainTimeout = null;
      }
      portrait.classList.remove('pain');
      setProfileImage(PROFILE_IMAGES.dying);
      cancelAnimationFrame(animationId);
      const difficultyLabel = getCurrentDifficultyConfig().label;
      endTitle.textContent = '게임 오버';
      endDesc.innerHTML = `도구리가 쓰러졌습니다.<br />도달 층: <b>${difficultyLabel} ${currentFloor}층</b> · 처치한 몬스터: <b>${player.kills}</b>마리`;
      restartButton.textContent = '다시 도전';
      const restartActionCol = restartButton.closest('.end-action-col');
      if (restartActionCol) restartActionCol.style.display = 'flex';
      const homeActionCol = homeButton.closest('.end-action-col');
      if (homeActionCol) homeActionCol.style.display = 'flex';
      if (homeHintKbd) homeHintKbd.textContent = 'ESC';
      showEndOverlay();
      updateKeyboardHint();
    }

    function winGame() {
      gameState = 'clear';
      setBlocking(false);
      clearAllMonsterSpecialTimers();
      cancelAnimationFrame(animationId);
      renderHud();
      updatePlayTimeHud();
      const currentRecordText = formatPlayTime(elapsed);
      const bestRecord = updateBestClearTime(elapsed);
      const bestRecordText = formatPlayTime(bestRecord);
      endTitle.textContent = '게임 클리어!';
      endDesc.innerHTML = `<span class="message-line">현재 기록: <b>${currentRecordText}</b></span><span class="message-line">최단 기록: <b>${bestRecordText}</b></span>`;
      restartButton.textContent = '다시 도전';
      const restartActionCol = restartButton.closest('.end-action-col');
      if (restartActionCol) restartActionCol.style.display = 'none';
      const homeActionCol = homeButton.closest('.end-action-col');
      if (homeActionCol) homeActionCol.style.display = 'flex';
      if (homeHintKbd) homeHintKbd.textContent = 'Space';
      showEndOverlay();
      updateKeyboardHint();
    }

    if (alphaKeyboard) {
      alphaKeyboard.addEventListener('pointerdown', (e) => {
        const button = e.target.closest('.alpha-key');
        if (!button) return;
        e.preventDefault();

        if (button.dataset.action === 'shield') {
          if (gameState !== 'playing' && gameState !== 'lobby') return;
          if (player.shields <= 0) {
            setMessage('방패 능력이 없어 방어할 수 없습니다.');
            updateActionButtonStates();
            return;
          }
          setBlocking(true);
          return;
        }

        if (button.dataset.action === 'threat') {
          playThreat();
          return;
        }

        handleAlphabetButton(button.dataset.key);
      });

      const releaseShieldButton = (e) => {
        const button = e.target.closest('.shield-key');
        if (!button) return;
        if (gameState !== 'playing' && gameState !== 'lobby') return;
        setBlocking(false);
      };

      alphaKeyboard.addEventListener('pointerup', releaseShieldButton);
      alphaKeyboard.addEventListener('pointercancel', releaseShieldButton);
      alphaKeyboard.addEventListener('pointerleave', (e) => {
        if (e.target.closest && e.target.closest('.shield-key')) {
          if (gameState === 'playing' || gameState === 'lobby') setBlocking(false);
        }
      }, true);
    }

    function clearLobbyButtonPress() {
      if (!lobbyDifficultyButtons) return;
      lobbyDifficultyButtons.querySelectorAll('.lobby-difficulty-button.pressed').forEach(button => button.classList.remove('pressed'));
    }

    if (lobbyDifficultyButtons) {
      lobbyDifficultyButtons.addEventListener('pointerdown', (e) => {
        const button = e.target.closest('.lobby-difficulty-button');
        if (!button) return;
        button.classList.add('pressed');
      });

      lobbyDifficultyButtons.addEventListener('pointerup', clearLobbyButtonPress);
      lobbyDifficultyButtons.addEventListener('pointercancel', clearLobbyButtonPress);
      lobbyDifficultyButtons.addEventListener('pointerleave', clearLobbyButtonPress);

      lobbyDifficultyButtons.addEventListener('click', (e) => {
        const button = e.target.closest('.lobby-difficulty-button');
        if (!button) return;
        e.preventDefault();
        startDifficultyGame(button.dataset.difficulty);
      });
    }

    if (lobbyInfoButton) {
      lobbyInfoButton.addEventListener('click', (e) => {
        e.preventDefault();
        if (gameState !== 'lobby' || isSceneTransitioning) return;
        showInfoOverlay();
      });
    }

    const rankingButton = document.getElementById('rankingButton');
    if (rankingButton) {
      rankingButton.addEventListener('click', (e) => {
        e.preventDefault();
      });
    }

    if (infoCloseButton) {
      infoCloseButton.addEventListener('click', (e) => {
        e.preventDefault();
        hideInfoOverlay();
      });
    }

    if (infoOverlay) {
      infoOverlay.addEventListener('click', (e) => {
        if (e.target === infoOverlay) hideInfoOverlay();
      });
    }

    if (rewardBestiaryButton) {
      rewardBestiaryButton.addEventListener('click', (e) => {
        e.preventDefault();
        // 도감 팝업은 추후 추가 예정입니다.
      });
    }

    if (rewardCloseButton) {
      rewardCloseButton.addEventListener('click', (e) => {
        e.preventDefault();
        closeRewardAndShowClear();
      });
    }

    if (rewardOverlay) {
      rewardOverlay.addEventListener('click', (e) => {
        if (e.target === rewardOverlay) closeRewardAndShowClear();
      });
    }

    potionSlot.addEventListener('click', (e) => {
      e.preventDefault();
      if (gameState === 'lobby') {
        useBestiaryButton();
        return;
      }
      usePotion();
    });
    startButton.addEventListener('click', () => enterLobby());
    if (startGateImage) {
      startGateImage.addEventListener('click', (e) => {
        e.preventDefault();
        enterLobby();
      });
    }
    if (cheatToggle) {
      cheatToggle.addEventListener('click', (e) => {
        e.preventDefault();
        cheatCodeEnabled = !cheatCodeEnabled;
        updateCheatToggle();
      });
    }
    if (cheatFloorPanel) {
      cheatFloorPanel.addEventListener('click', (e) => {
        const button = e.target.closest('.cheat-floor-button');
        if (!button) return;
        e.preventDefault();
        const floor = Number(button.dataset.floor);
        if (floor === 1) {
          selectedCheatFloor = 1;
          cheatCodeEnabled = false;
          updateCheatToggle();
          return;
        }
        setSelectedCheatFloor(floor);
      });
    }
    restartButton.addEventListener('click', () => {
      if (gameState === 'stageclear') {
        if (!stageProgressReady) return;
        startNextFloor();
      } else {
        restartGameWithFade();
      }
    });
    homeButton.addEventListener('click', goToStart);
    window.addEventListener('keydown', handleKeydown, { passive: false });
    window.addEventListener('keyup', handleKeyup, { passive: false });
    function handleWindowResize() {
      updateLobbyDifficultyLayout();
      if (player) renderHud();
    }

    window.addEventListener('resize', handleWindowResize);
    lobbyBgImage.addEventListener('load', updateLobbyDifficultyLayout);

    setCheatControlsVisible(true);
    updateCheatToggle();
    renderAlphabetKeyboard();
    renderMonsterTable();
    player = { hp: BASE_MAX_HP, maxHp: BASE_MAX_HP, shields: BASE_MAX_SHIELDS, maxShields: BASE_MAX_SHIELDS, potions: 1, level: 1, exp: 0, kills: 0 };
    elapsed = 0;
    updatePlayTimeHud();
    renderHud();
  </script>
</body>
</html>
