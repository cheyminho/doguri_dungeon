<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>던전앤도구리</title>
  <style>
    :root {
      --bg: #151515;
      --gold: #ffd166;
      --red: #ff5a6d;
      --heart: #ff526b;
      --empty-heart: #3b3b3b;
      --text: #f8f1dc;
      --muted: #9a9a9a;
      --good: #68e0a8;
      --panel: rgba(28, 28, 28, .82);
      --panel-line: rgba(255, 255, 255, .16);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fcf9f2;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #game, button, div, span, p, h1, h2, h3, small {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #game {
      position: relative;
      width: min(100vw, 1180px);
      height: min(100vh, 720px);
      min-height: 560px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      isolation: isolate;
    }


    .dungeon {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 208px;
      overflow: hidden;
      background: #151515 url("dungeon_bg.png") center bottom / cover no-repeat;
    }

    .dungeon .ceiling,
    .dungeon .floor,
    .dungeon .left-wall,
    .dungeon .right-wall,
    .dungeon .back-wall,
    .dungeon .torch {
      display: none;
    }

    .ceiling, .floor, .left-wall, .right-wall, .back-wall {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .back-wall {
      top: 15%;
      left: 22%;
      right: 22%;
      bottom: 42%;
      border: 3px solid rgba(255,255,255,.06);
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px) 0 0/58px 58px,
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px) 0 0/58px 58px,
        linear-gradient(180deg, #303030, #1a1a1a);
      box-shadow: inset 0 0 90px rgba(0,0,0,.55), 0 0 120px rgba(0,0,0,.55);
      clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%);
    }

    .ceiling {
      bottom: 54%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 2px, transparent 2px 92px),
        linear-gradient(180deg, #2e2e2e, #151515);
      clip-path: polygon(0 0, 100% 0, 72% 100%, 28% 100%);
      opacity: .86;
    }

    .floor {
      top: 45%;
      background:
        linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,.08) 49.5% 50.5%, transparent 51%),
        repeating-conic-gradient(from 45deg at 50% 0%, rgba(255,255,255,.035) 0 25%, transparent 0 50%) 0 0/140px 140px,
        linear-gradient(180deg, #202020, #070707 76%);
      clip-path: polygon(28% 0, 72% 0, 100% 100%, 0 100%);
      box-shadow: inset 0 80px 120px rgba(0,0,0,.38);
    }

    .left-wall {
      right: 50%;
      background:
        repeating-linear-gradient(18deg, rgba(255,255,255,.04) 0 2px, transparent 2px 58px),
        linear-gradient(90deg, #303030, #161616);
      clip-path: polygon(0 0, 100% 38%, 100% 100%, 0 100%);
      opacity: .78;
    }

    .right-wall {
      left: 50%;
      background:
        repeating-linear-gradient(-18deg, rgba(255,255,255,.04) 0 2px, transparent 2px 58px),
        linear-gradient(270deg, #343434, #161616);
      clip-path: polygon(0 38%, 100% 0, 100% 100%, 0 100%);
      opacity: .78;
    }

    .torch {
      position: absolute;
      width: 48px;
      height: 86px;
      top: 23%;
      z-index: 4;
      filter: drop-shadow(0 0 18px rgba(255,146,55,.6));
    }

    .torch.left { left: 15%; }
    .torch.right { right: 15%; transform: scaleX(-1); }

    .torch::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 38px;
      width: 16px;
      height: 46px;
      border-radius: 9px;
      background: linear-gradient(#6b3b20, #2f1b14);
      transform: rotate(12deg);
    }

    .torch::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 0;
      width: 30px;
      height: 46px;
      border-radius: 50% 50% 45% 45%;
      background:
        radial-gradient(circle at 50% 65%, #fff3a1 0 18%, transparent 20%),
        radial-gradient(circle at 50% 52%, #ffb13d 0 38%, transparent 40%),
        radial-gradient(circle at 50% 45%, #ff5c2d 0 58%, transparent 60%);
      animation: flame .22s infinite alternate ease-in-out;
      transform-origin: 50% 100%;
    }

    @keyframes flame {
      from { transform: scale(.95, 1.08) rotate(-3deg); filter: brightness(1); }
      to { transform: scale(1.06, .94) rotate(4deg); filter: brightness(1.22); }
    }

    #monsterLayer {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .monster {
      --x: 0px;
      --y: 43%;
      --scale: 1;
      position: absolute;
      left: calc(50% + var(--x));
      top: var(--y);
      width: 267px;
      height: 330px;
      transform: translate(-50%, -50%) scale(var(--scale));
      transform-origin: 50% 50%;
      display: grid;
      justify-items: center;
      animation: monsterIn .24s cubic-bezier(.2, 1.3, .45, 1) both;
      filter: drop-shadow(0 24px 22px rgba(0,0,0,.42));
      transition: left .16s ease-out, top .16s ease-out;
    }

    .monster::after {
      content: "";
      position: absolute;
      z-index: 0;
      left: 50%;
      top: 232px;
      width: 212px;
      height: 40px;
      translate: -50% 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, .34);
      filter: blur(10px);
      pointer-events: none;
    }

    .monster.lane-left { --x: -260px; --scale: 1; }
    .monster.lane-mid { --x: 0px; --scale: 1; }
    .monster.lane-right { --x: 260px; --scale: 1; }

    .monster.attack {
      animation: monsterAttack .28s ease-in-out both;
    }

    .monster.hit .monster-body {
      animation: monsterHit .16s ease-out both;
    }

    .monster-hit-slash {
      position: absolute;
      z-index: 6;
      left: calc(50% + var(--slash-offset-x, 0px));
      top: calc(52% + var(--slash-offset-y, 0px) + var(--hit-effect-offset-y, 0px));
      width: 190px;
      height: 56px;
      pointer-events: none;
      translate: -50% -50%;
      visibility: hidden;
    }

    .monster-hit-slash::before {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: 24px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 0%, #fff8d6 12%, #ffffff 48%, #ffd166 84%, transparent 100%);
      transform: rotate(calc(-28deg + var(--slash-rotate, 0deg)));
      transform-origin: 50% 50%;
    }

    .monster.hit .monster-hit-slash {
      visibility: visible;
      animation: monsterSlashTrail .18s ease-out both;
    }

    .defeat-burst {
      position: absolute;
      z-index: 8;
      left: 50%;
      top: 58%;
      width: 110px;
      height: 72px;
      translate: -50% -50%;
      transform-origin: 50% 50%;
      pointer-events: none;
      opacity: 0;
    }

    .defeat-burst span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--dust-size, 24px);
      height: var(--dust-size, 24px);
      margin-left: calc(var(--dust-size, 24px) * -0.5);
      margin-top: calc(var(--dust-size, 24px) * -0.5);
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, rgba(230,222,210,.68), rgba(152,140,124,.92) 42%, rgba(82,72,62,.92) 100%);
      filter: blur(2px);
      opacity: 0;
      transform: translate(0, 0) scale(.25);
    }

    .defeat-burst span:nth-child(1) { --dust-size: 30px; --dust-x: -24px; --dust-y: -8px; }
    .defeat-burst span:nth-child(2) { --dust-size: 34px; --dust-x: -10px; --dust-y: -18px; }
    .defeat-burst span:nth-child(3) { --dust-size: 28px; --dust-x: 10px; --dust-y: -14px; }
    .defeat-burst span:nth-child(4) { --dust-size: 32px; --dust-x: 28px; --dust-y: -4px; }
    .defeat-burst span:nth-child(5) { --dust-size: 36px; --dust-x: -28px; --dust-y: 10px; }
    .defeat-burst span:nth-child(6) { --dust-size: 38px; --dust-x: -4px; --dust-y: 12px; }
    .defeat-burst span:nth-child(7) { --dust-size: 30px; --dust-x: 18px; --dust-y: 14px; }
    .defeat-burst span:nth-child(8) { --dust-size: 24px; --dust-x: 34px; --dust-y: 10px; }

    .monster.dead {
      animation: monsterDead .38s ease-in both;
    }

    .monster.dead .defeat-burst {
      opacity: 1;
      transform: scale(3);
    }

    .monster.dead .defeat-burst span {
      animation: defeatDust .42s ease-out both;
    }

    @keyframes monsterIn {
      from { opacity: 0; transform: translate(-50%, -50%) translateY(30px) scale(calc(var(--scale) * .72)); }
      to { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(var(--scale)); }
    }


    @keyframes monsterAttack {
      0% { translate: 0 0; filter: drop-shadow(0 24px 22px rgba(0,0,0,.52)); }
      48% { translate: 0 60px; filter: drop-shadow(0 10px 12px rgba(0,0,0,.65)) brightness(1.25); }
      100% { translate: 0 0; }
    }

    @keyframes monsterHit {
      0%, 100% { transform: translateX(0) scale(1); filter: none; }
      35% { transform: translateX(-8px) scale(1.04); filter: brightness(1.65) saturate(1.25); }
      70% { transform: translateX(5px) scale(.98); filter: brightness(1.2); }
    }

    @keyframes monsterSlashTrail {
      0% { visibility: visible; transform: translate(-40px, 18px) scale(.88, .96); }
      85% { visibility: visible; transform: translate(10px, -6px) scale(1.08, 1.02); }
      100% { visibility: hidden; transform: translate(28px, -14px) scale(.98, .94); }
    }

    @keyframes defeatDust {
      0% { opacity: 0; transform: translate(0, 0) scale(.25); }
      22% { opacity: .92; }
      100% { opacity: 0; transform: translate(var(--dust-x), var(--dust-y)) scale(1.28); }
    }

    @keyframes resultPop {
      0% { opacity: 0; transform: translate(-50%, calc(var(--stack-offset) + 6px)) scale(.96); }
      8% { opacity: 1; transform: translate(-50%, var(--stack-offset)) scale(1); }
      17% { opacity: 1; transform: translate(-50%, var(--stack-offset)) scale(1); }
      100% { opacity: 0; transform: translate(-50%, var(--stack-offset)) scale(.98); }
    }

    @keyframes monsterDead {
      to { opacity: 0; transform: translate(-50%, -50%) translateY(-20px) scale(calc(var(--scale) * .42)); filter: blur(4px) brightness(.9); }
    }

    .nameplate {
      position: absolute;
      z-index: 2;
      top: -2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 250px;
      padding: 9px 12px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      white-space: nowrap;
    }

    .monster.level-low {
      --hit-effect-offset-y: 30px;
    }

    .monster.level-low .nameplate {
      top: 28px;
    }

    .monster-results {
      position: absolute;
      left: 50%;
      top: -20px;
      translate: -50% 0;
      width: 180px;
      pointer-events: none;
    }

    .monster-result {
      position: absolute;
      left: 50%;
      top: 0;
      translate: -50% 0;
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .03em;
      text-shadow: 0 2px 0 rgba(0,0,0,.65);
      white-space: nowrap;
      --stack-offset: 0px;
    }

    .monster-result.show {
      animation: resultPop 1s ease-out both;
    }

    .monster-result.perfect { color: #ffe88e; }
    .monster-result.great { color: #ffd166; }
    .monster-result.good { color: #68e0a8; }
    .monster-result.bad { color: #cfc3dc; }
    .monster-result.miss { color: #ff8e9b; }

    .word {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: .4px;
      color: #fff7de;
      text-shadow: 0 2px 0 #000;
    }

    .word .done {
      color: #4e4853;
      text-shadow: none;
    }

    .word .need-input {
      color: #ff5a6d;
      text-shadow: 0 2px 0 rgba(0,0,0,.75);
    }

    .word .space {
      display: inline-block;
      width: .45em;
    }

    .timer-ring {
      position: relative;
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: conic-gradient(var(--red) 0deg, rgba(255,255,255,.13) 0deg);
      box-shadow: inset 0 0 0 3px rgba(0,0,0,.48), 0 0 16px rgba(255,90,109,.2);
    }

    .timer-ring::after {
      content: attr(data-time);
      position: absolute;
      inset: 6px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #14101a;
      color: #fff1d1;
      font-size: 9px;
      font-weight: 900;
    }

    .monster-body {
      position: relative;
      z-index: 1;
      width: 270px;
      height: 270px;
      margin-top: 28px;
      background-image: url('monsters.png');
      background-size: 400% 400%;
      background-position: var(--monster-sprite-x, 0%) var(--monster-sprite-y, 0%);
      background-repeat: no-repeat;
    }

    .enemy-lv {
      display: none;
    }


    #guardShield {
      position: absolute;
      z-index: 14;
      left: 60px;
      bottom: 76px;
      width: 256px;
      height: 256px;
      transform-origin: 30% 80%;
      scale: 1.2;
      transform: rotate(16deg) translate(-10px, 10px);
      filter: drop-shadow(0 28px 18px rgba(0,0,0,.5));
      pointer-events: none;
      transition: transform .12s ease-out, filter .12s ease-out;
    }

    #guardShield img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    #guardShield.holding {
      transform: rotate(3deg) translate(6px, -10px) scale(1.03);
      filter: drop-shadow(0 32px 20px rgba(0,0,0,.56)) brightness(1.08);
    }

    #guardShield.block {
      animation: shieldBlock .18s ease-out both;
    }

    @keyframes shieldBlock {
      0% { transform: rotate(3deg) translate(6px, -10px) scale(1.03); }
      45% { transform: rotate(-4deg) translate(16px, -20px) scale(1.08); }
      100% { transform: rotate(3deg) translate(6px, -10px) scale(1.03); }
    }

    #sword {
      position: absolute;
      z-index: 14;
      right: 58px;
      bottom: 122px;
      width: 128px;
      height: 256px;
      transform-origin: 78% 86%;
      scale: 1.2;
      transform: rotate(-24deg) translate(10px, 12px);
      filter: drop-shadow(0 28px 18px rgba(0,0,0,.55));
      pointer-events: none;
    }

    #sword img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    #sword.slash {
      animation: slash .16s cubic-bezier(.15, .9, .2, 1) both;
    }

    @keyframes slash {
      0% { transform: rotate(-24deg) translate(10px, 12px); }
      42% { transform: rotate(-60deg) translate(-32px, -16px) scale(1.06); filter: drop-shadow(0 28px 18px rgba(0,0,0,.55)) brightness(1.4); }
      100% { transform: rotate(-24deg) translate(10px, 12px); }
    }

    #hud {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 18;
      min-height: 208px;
      padding: 24px 22px 16px;
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr) 84px;
      grid-template-rows: auto auto auto;
      gap: 10px 16px;
      align-items: center;
      background:
        linear-gradient(180deg, rgba(8,6,10,0), rgba(8,6,10,.45) 0%),
        linear-gradient(180deg, rgba(36,25,43,.94), rgba(15,11,18,.98));
      border-top: 2px solid rgba(255,255,255,.14);
      box-shadow: 0 -18px 40px rgba(0,0,0,.38);
    }

    .portrait-panel {
      position: relative;
      z-index: 10;
      grid-column: 1;
      grid-row: 1 / span 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 104px;
      align-self: center;
    }

    .input-bubble {
      position: absolute;
      left: 50%;
      top: -50px;
      z-index: 30;
      min-width: 46px;
      padding: 7px 13px;
      border-radius: 15px;
      background: #fcf9f2;
      color: #21131c;
      font-size: 18px;
      font-weight: 950;
      line-height: 1;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      translate: -50% 0;
      transform: translateY(8px) scale(.9);
    }

    .input-bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      width: 7px;
      height: 7px;
      background: inherit;
      rotate: 45deg;
      translate: -50% 0;
      border-radius: 1px;
    }

    .input-bubble.show {
      animation: inputBubblePop .46s ease-out both;
    }

    @keyframes inputBubblePop {
      0% { opacity: 0; transform: translateY(8px) scale(.9); }
      16% { opacity: 1; transform: translateY(0) scale(1); }
      72% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-6px) scale(.96); }
    }

    #portrait {
      position: relative;
      width: 104px;
      height: 104px;
      border-radius: 24px;
      background: transparent;
      border: 4px solid rgba(255,255,255,.18);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    #profileImage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    #portrait.hit {
      animation: portraitHit .24s ease both;
    }

    @keyframes portraitHit {
      0%, 100% { transform: translateX(0); filter: none; }
      20% { transform: translateX(-7px); filter: brightness(1.8) saturate(1.4); }
      45% { transform: translateX(8px); }
      70% { transform: translateX(-4px); }
    }

    .blood-flash {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background: radial-gradient(circle, transparent 35%, rgba(255, 30, 55, .34));
      opacity: 0;
    }

    .blood-flash.show {
      animation: blood .22s ease both;
    }

    .blood-flash.blocked {
      background: radial-gradient(circle, transparent 35%, rgba(90, 165, 255, .34));
    }

    .blood-flash.dodged {
      background: radial-gradient(circle, transparent 35%, rgba(72, 220, 138, .34));
    }

    @keyframes blood {
      0% { opacity: 0; }
      35% { opacity: 1; }
      100% { opacity: 0; }
    }

    .hud-main {
      grid-column: 2;
      grid-row: 1 / span 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 11px;
      min-width: 0;
      align-self: center;
    }

    .stats-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    #hearts {
      display: flex;
      gap: 1px;
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 3px 0 rgba(0,0,0,.35));
    }

    .heart.full { color: var(--heart); }
    .heart.empty { color: var(--empty-heart); opacity: .2; }
    .heart + .heart { margin-left: -4px; }

    #shields {
      display: flex;
      align-items: center;
      gap: 1px;
      margin-left: -7px;
      font-size: 24px;
      line-height: 1;
      filter: drop-shadow(0 3px 0 rgba(0,0,0,.28));
    }

    .shield-charge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .shield-charge + .shield-charge {
      margin-left: -4px;
    }

    .shield-charge.full {
      color: inherit;
    }


    #potionSlot {
      grid-column: 3;
      grid-row: 1 / span 2;
      justify-self: end;
      align-self: center;
      transform: translate(-10px, -6px);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      min-width: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
      filter: none;
      box-shadow: none;
      touch-action: manipulation;
    }

    #potionSlot:active {
      scale: .94;
    }

    #potionIcon {
      display: block;
      width: 66px;
      height: 66px;
      object-fit: contain;
      line-height: 1;
      pointer-events: none;
    }

    #potionHotkey {
      display: inline-flex;
      font-size: 12px;
      line-height: 1;
      margin-top: -2px;
    }

    .level-box {
      display: none;
    }

    #levelText {
      position: absolute;
      right: 6px;
      bottom: 6px;
      z-index: 2;
      min-width: 0;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(21, 16, 23, .82);
      border: 1px solid rgba(255,255,255,.14);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      color: #fff6d7;
      box-shadow: 0 3px 8px rgba(0,0,0,.25);
    }

    .exp-bar {
      position: absolute;
      left: 0;
      right: 0;
      top: -2px;
      height: 6px;
      width: 100%;
      flex: none;
      border-radius: 0;
      overflow: hidden;
      background: rgba(255,255,255,.1);
      border: 0;
      border-top: 1px solid rgba(255,255,255,.18);
      border-bottom: 1px solid rgba(0,0,0,.28);
      z-index: 3;
    }

    #expFill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: #68e0a8;
      transition: width .25s ease;
    }

    #expText {
      display: none;
    }

    #message {
      width: 100%;
      height: 56px;
      display: block;
      color: #cfc3dc;
      font-size: 14px;
      line-height: 2.05;
      white-space: normal;
      overflow: hidden;
    }

    .message-line {
      display: block;
      white-space: nowrap;
      letter-spacing: -0.02em;
    }

    #message .kbd {
      padding: 1px 5px;
      border-radius: 5px;
      font-size: .92em;
    }

    .hud-side {
      justify-self: end;
      display: none;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      color: #cfc3dc;
      font-size: 13px;
    }

    #alphaKeyboard {
      grid-column: 1 / -1;
      width: min(720px, 100%);
      justify-self: center;
      display: none;
      flex-direction: column;
      gap: 7px;
      align-items: center;
      padding-top: 2px;
      transform: translateY(-12px);
    }

    .alpha-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    .alpha-row:nth-child(2) { padding-left: 22px; }
    .alpha-row:nth-child(3) { padding-left: 18px; }

    .alpha-key {
      width: clamp(30px, 4.5vw, 44px);
      height: 34px;
      padding: 0;
      border-radius: 10px;
      color: #261821;
      background: #fff1d1;
      font-size: 13px;
      font-weight: 950;
      line-height: 1;
      box-shadow: none;
      touch-action: manipulation;
      transition: scale .08s ease, transform .08s ease;
    }
    .alpha-key.next-key {
      background: #fff59d;
      box-shadow: none;
      transform: translateY(-2px) scale(1.06);
    }


    .alpha-key:active {
      scale: .94;
      box-shadow: none;
    }

    .alpha-key.disabled,
    .alpha-key:disabled {
      opacity: .48;
      filter: grayscale(.5);
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .shield-key,
    .dodge-key {
      min-width: 52px;
      font-size: 12px;
    }

    .score {
      font-size: 18px;
      font-weight: 900;
      color: #fff6d7;
    }

    .kbd {
      padding: 2px 7px;
      border-radius: 6px;
      color: #211823;
      background: #fff1d1;
      font-weight: 900;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 42%, rgba(220, 220, 220, .11), transparent 28%),
        rgba(7, 7, 7, .72);
      backdrop-filter: blur(3px);
    }

    .overlay.hidden { display: none; }

    .modal {
      width: min(560px, 92vw);
      padding: 30px 28px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(48,48,48,.96), rgba(18,18,18,.98));
      border: 1px solid rgba(255,255,255,.17);
      box-shadow: 0 24px 80px rgba(0,0,0,.58);
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 12px;
      font-size: 44px;
      letter-spacing: -1.6px;
    }

    .modal p {
      margin: 0 auto 18px;
      max-width: 430px;
      color: #d0d0d0;
      line-height: 1.65;
      font-size: 15px;
    }

    #startOverlay {
      padding: 0;
      background: #fcf9f2;
      backdrop-filter: none;
    }

    #startOverlay .modal {
      width: 100%;
      height: 100%;
      border-radius: 0;
      padding: clamp(26px, 5vw, 58px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 2.6vh, 24px);
      background: #fcf9f2;
      border: 0;
      box-shadow: none;
    }

    .start-copy {
      text-align: center;
      color: #000;
      text-shadow: none;
    }

    #startOverlay .modal h2 {
      margin: 0;
      color: #000;
      font-size: clamp(46px, 8vw, 82px);
      line-height: .95;
      letter-spacing: -2.2px;
    }

    .start-version {
      margin-top: 9px;
      color: #000;
      font-size: clamp(13px, 1.8vw, 17px);
      font-weight: 800;
      letter-spacing: .14em;
    }

    .dungeon-entrance {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(510px, 74vw);
      height: min(300px, 36vh);
      min-height: 220px;
      margin: 2px 0 4px;
      filter: none;
    }

    .dungeon-entrance::before {
      content: none;
    }

    .start-gate-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .entrance-tower {
      position: absolute;
      bottom: 18%;
      width: 23%;
      height: 78%;
      border: 4px solid rgba(255,255,255,.13);
      border-radius: 14px 14px 6px 6px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px) 0 0/38px 36px,
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px) 0 0/38px 36px,
        linear-gradient(180deg, #555, #292929);
      box-shadow: inset 0 -24px 34px rgba(0,0,0,.32);
    }

    .entrance-tower::before {
      content: "";
      position: absolute;
      left: -4px;
      right: -4px;
      top: -22px;
      height: 28px;
      background:
        linear-gradient(90deg, #5b5b5b 0 18%, transparent 18% 28%, #5b5b5b 28% 46%, transparent 46% 56%, #5b5b5b 56% 74%, transparent 74% 84%, #5b5b5b 84% 100%);
      border: 4px solid rgba(255,255,255,.13);
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
    }

    .entrance-tower.left { left: 0; }
    .entrance-tower.right { right: 0; }

    .entrance-gate {
      position: absolute;
      left: 50%;
      bottom: 18%;
      width: 43%;
      height: 76%;
      translate: -50% 0;
      border: 12px solid #555;
      border-bottom-width: 8px;
      border-radius: 50% 50% 10px 10px / 42% 42% 10px 10px;
      background:
        radial-gradient(circle at 50% 68%, rgba(255,255,255,.10), transparent 28%),
        linear-gradient(180deg, #101010, #020202);
      box-shadow:
        inset 0 0 46px rgba(0,0,0,.85),
        0 0 0 4px rgba(255,255,255,.07);
      overflow: hidden;
    }

    .entrance-gate::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -18%;
      width: 68%;
      height: 58%;
      translate: -50% 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.16), transparent 66%);
      opacity: .55;
    }

    .entrance-path {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 62%;
      height: 32%;
      translate: -50% 0;
      clip-path: polygon(33% 0, 67% 0, 100% 100%, 0 100%);
      background:
        linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,.08) 49.5% 50.5%, transparent 51%),
        linear-gradient(180deg, #242424, #090909);
      border-top: 2px solid rgba(255,255,255,.12);
      opacity: .95;
    }

    .start-hint, .button-hint {
      color: #bcbcbc;
      font-size: 13px;
      font-weight: 700;
    }

    #startOverlay .start-hint {
      width: 100%;
      margin-top: -8px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      text-align: center;
      text-shadow: none;
      transform: translateY(-6px);
    }

    #startOverlay .start-hint .kbd {
      color: #fff;
      background: #000;
      text-shadow: none;
    }

    .cheat-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 3;
      padding: 9px 14px;
      border: 1px solid #000;
      border-radius: 999px;
      color: #000;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: none;
    }

    .cheat-toggle.active {
      color: #fff;
      background: #000;
    }

    .button-hint {
      margin-top: 14px;
      width: fit-content;
      align-self: center;
    }

    .monster-table {
      max-height: 170px;
      overflow: auto;
      margin: 16px 0 20px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(0,0,0,.16);
      text-align: left;
    }

    .monster-table div {
      display: grid;
      grid-template-columns: 50px 1fr 70px;
      gap: 8px;
      padding: 7px 12px;
      color: #e8e8e8;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .monster-table div:last-child { border-bottom: 0; }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 28px;
      color: #21131c;
      background: #ffe29b;
      font-size: 18px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: none;
      transition: scale .08s ease, transform .08s ease;
    }

    button:active {
      scale: .96;
      box-shadow: none;
    }

    .end-actions {
      display: grid;
      grid-template-columns: auto auto;
      justify-content: center;
      align-items: start;
      gap: 14px;
      margin-top: 4px;
    }

    .end-action-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .secondary-button {
      color: #f8f1dc;
      background: #565656;
      box-shadow: none;
    }

    .secondary-button:active {
      box-shadow: none;
    }

    #comboToast {
      position: absolute;
      z-index: 22;
      top: 96px;
      left: 50%;
      translate: -50% 0;
      padding: 8px 16px;
      border-radius: 999px;
      color: #21131c;
      background: rgba(255, 209, 102, .94);
      font-weight: 950;
      opacity: 0;
      transform: translateY(8px) scale(.96);
      pointer-events: none;
    }



    #stageHud {
      position: absolute;
      z-index: 21;
      left: 28px;
      top: 24px;
      pointer-events: none;
      text-align: left;
      text-shadow: 0 4px 0 rgba(0,0,0,.55), 0 8px 20px rgba(0,0,0,.45);
    }

    #floorText {
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 950;
      line-height: .95;
      letter-spacing: -0.05em;
      color: #fff6d7;
    }

    #floorProgressText {
      margin-top: 8px;
      font-size: clamp(15px, 2.2vw, 22px);
      font-weight: 900;
      line-height: 1;
      color: #fff6d7;
      letter-spacing: -0.02em;
    }

    #playTimeHud {
      position: absolute;
      z-index: 21;
      right: 28px;
      top: 24px;
      pointer-events: none;
      color: #fff6d7;
      font-size: clamp(18px, 2.6vw, 28px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.03em;
      text-align: right;
      text-shadow: 0 4px 0 rgba(0,0,0,.55), 0 8px 20px rgba(0,0,0,.45);
    }

    #comboToast.show {
      animation: toast .75s ease both;
    }

    @keyframes toast {
      0% { opacity: 0; transform: translateY(8px) scale(.96); }
      18% { opacity: 1; transform: translateY(0) scale(1); }
      82% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-12px) scale(.96); }
    }

    .shake {
      animation: screenShake .18s ease both;
    }

    .block-shake {
      animation: blockShake .26s ease both;
    }

    .dodge-shake {
      animation: dodgeShake .22s ease both;
    }

    @keyframes screenShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      45% { transform: translateX(8px); }
      70% { transform: translateX(-4px); }
    }

    @keyframes blockShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      45% { transform: translateX(5px); }
      70% { transform: translateX(-3px); }
    }

    @keyframes dodgeShake {
      0%,100% { transform: translateX(0); }
      16% { transform: translateX(-8px); }
      36% { transform: translateX(10px); }
      58% { transform: translateX(-7px); }
      78% { transform: translateX(6px); }
    }

    @media (max-width: 760px) {
      #game {
        height: 100vh;
        min-height: 540px;
        border: 0;
      }

      #stageHud { left: 14px; top: 24px; }
      #playTimeHud { right: 14px; top: 24px; font-size: 18px; }
      #floorText { font-size: 34px; }
      #floorProgressText { margin-top: 5px; font-size: 14px; }

      .dungeon {
        bottom: 294px;
        transform: none;
        transform-origin: 50% 0;
        background-size: cover;
        background-position: center bottom;
      }

      .monster { --y: 36%; width: 225px; height: 300px; }
      .monster::after { top: 204px; width: 170px; height: 32px; filter: blur(8px); }
      .monster-body { width: 234px; height: 234px; margin-top: 34px; }
      .monster.lane-left { --x: -112px; --scale: .76; }
      .monster.lane-mid { --x: 0px; --scale: .76; }
      .monster.lane-right { --x: 112px; --scale: .76; }
      .nameplate { min-width: 190px; top: 2px; gap: 7px; padding: 8px 10px; }
      .monster.level-low .nameplate { top: 32px; }
      .monster-results { top: -18px; width: 160px; }
      .monster-result { font-size: 12px; }
      .word { font-size: 15px; }
      .timer-ring { width: 30px; height: 30px; }
      #guardShield { left: 0px; bottom: 158px; scale: .7; }
      #sword { right: -4px; bottom: 206px; scale: .7; }
      #hud { grid-template-columns: 82px minmax(0, 1fr) 54px; min-height: 280px; padding: 24px 10px 14px; gap: 8px 10px; bottom: 14px; }
      .portrait-panel { width: 78px; translate: 0 -10px; }
      .input-bubble { top: -41px; min-width: 40px; padding: 6px 11px; border-radius: 13px; font-size: 16px; }
      #portrait { width: 78px; height: 78px; border-radius: 19px; }
      .hud-main { translate: 0 -10px; gap: 5px; }
      .hud-side { display: none; }
      #hearts { gap: 1px; font-size: 23px; }
      #shields { gap: 1px; margin-left: -6px; font-size: 20px; }
      #potionSlot { justify-self: end; align-self: center; transform: translate(-8px, -8px); gap: 0; min-width: 0; padding: 0; }
      #potionSlot:active { scale: .94; }
      #potionIcon { width: 54px; height: 54px; }
      #potionHotkey { display: inline-flex; font-size: 11px; }
      .stats-row { gap: 4px; padding-right: 0; }
      .level-box { min-width: 0; width: 100%; gap: 6px; }
      #message { font-size: 10.5px; width: 100%; height: 48px; line-height: 2.0; max-width: none; overflow: hidden; }
      #message .kbd { padding: 1px 4px; font-size: .9em; }

      #levelText { right: 4px; bottom: 4px; padding: 2px 6px; font-size: 11px; }
      .exp-bar { height: 5px; }
      #message { font-size: 10.5px; width: 100%; height: 48px; line-height: 2.0; max-width: none; overflow: hidden; }
      #message .kbd { padding: 1px 4px; font-size: .9em; }
      #alphaKeyboard { display: flex; gap: 5px; transform: translateY(-16px); }
      .alpha-row { gap: 3px; }
      .alpha-row:nth-child(2) { padding-left: 12px; }
      .alpha-row:nth-child(3) { padding-left: 8px; }
      .alpha-key { width: clamp(29px, 8.6vw, 35px); height: 34px; border-radius: 9px; font-size: 13px; }
      .shield-key { width: 44px; min-width: 44px; font-size: 12px; }
      .dodge-key { width: 44px; min-width: 44px; font-size: 12px; }
      .modal h2 { font-size: 34px; }
      .cheat-toggle { top: 12px; right: 12px; padding: 8px 12px; font-size: 11px; }
      .dungeon-entrance { width: min(440px, 84vw); height: min(260px, 33vh); min-height: 190px; }
      .start-hint, .button-hint { font-size: 12px; }
    }
  </style>
</head>
<body>
  <main id="game" aria-label="던전앤도구리 타이핑 게임">
    <section class="dungeon" aria-hidden="true">
      <div class="ceiling"></div>
      <div class="left-wall"></div>
      <div class="right-wall"></div>
      <div class="back-wall"></div>
      <div class="floor"></div>
      <div class="torch left"></div>
      <div class="torch right"></div>
    </section>


    <div id="monsterLayer"></div>
    <div id="comboToast"></div>

    <div id="stageHud" aria-label="스테이지 진행도">
      <div id="floorText">지하 1층</div>
      <div id="floorProgressText">0%</div>
    </div>

    <div id="playTimeHud" aria-label="플레이 타임">00:00</div>

    <div id="guardShield" aria-hidden="true">
      <img src="shield.png" alt="" draggable="false" />
    </div>

    <div id="sword" aria-hidden="true">
      <img src="sword.png" alt="" draggable="false" />
    </div>

    <section id="hud">
      <div class="exp-bar" aria-label="경험치">
        <div id="expFill"></div>
        <div id="expText">0 / 100</div>
      </div>
      <div class="portrait-panel">
        <div id="inputBubble" class="input-bubble" aria-hidden="true">A</div>
        <div id="portrait" aria-label="도구리 초상화">
          <img id="profileImage" src="profile_idle.png" alt="" draggable="false" />
          <div id="levelText">Lv. 1</div>
        </div>
      </div>
      <div class="hud-main">
        <div class="stats-row">
          <div id="hearts" aria-label="생명력"></div>
          <div id="shields" aria-label="방패 능력"></div>
        </div>
        <div id="message"><span class="message-line">몬스터 이름을 입력해 처치하세요!</span><span class="message-line"><span class="kbd">Space</span>로 방어! <span class="kbd">Tab</span>으로 회피!</span></div>
      </div>
      <button id="potionSlot" type="button" aria-label="사과 사용">
        <img id="potionIcon" src="apple.png" alt="사과" draggable="false" />
        <span id="potionHotkey" class="kbd">Ctrl</span>
      </button>
      <div id="alphaKeyboard" aria-label="알파벳 입력 버튼"></div>
    </section>

    <div class="blood-flash" id="bloodFlash"></div>

    <div class="overlay" id="startOverlay">
      <button id="cheatToggle" class="cheat-toggle" type="button" aria-pressed="false">치트 OFF</button>
      <div class="modal start-screen">
        <div class="start-copy">
          <h2>던전앤도구리</h2>
          <div class="start-version">버전 0.38</div>
        </div>
        <div class="dungeon-entrance" aria-hidden="true">
          <img class="start-gate-image" src="gate.png" alt="" />
        </div>
        <button id="startButton">입장</button>
        <div class="start-hint"><span class="kbd">Space</span></div>
      </div>
    </div>

    <div class="overlay hidden" id="endOverlay">
      <div class="modal">
        <h2 id="endTitle">게임 오버</h2>
        <p id="endDesc">도구리가 던전 바닥과 친해졌습니다.</p>
        <div class="end-actions">
          <div class="end-action-col">
            <button id="restartButton">다시 도전</button>
            <div class="button-hint"><span class="kbd">Space</span></div>
          </div>
          <div class="end-action-col">
            <button id="homeButton" class="secondary-button">시작 화면</button>
            <div class="button-hint home-hint"><span class="kbd">ESC</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const MONSTER_DATA = [
      { level: 1, name: 'Rat', attackTime: 4.0, colors: ['#7a7080', '#3d3545'] },
      { level: 2, name: 'Toad', attackTime: 4.2, colors: ['#6d82a3', '#344259'] },
      { level: 3, name: 'Slime', attackTime: 4.4, colors: ['#85a27d', '#40543b'] },
      { level: 4, name: 'Goblin', attackTime: 4.7, colors: ['#78c26b', '#32743f'] },
      { level: 5, name: 'Cyclops', attackTime: 5.0, colors: ['#8bd0e7', '#3d678d'] },
      { level: 6, name: 'Basilisk', attackTime: 5.3, colors: ['#d9d1ba', '#827665'] },
      { level: 7, name: 'Dire Troll', attackTime: 5.7, colors: ['#b7865d', '#65402d'] },
      { level: 8, name: 'Magma Golem', attackTime: 6.0, colors: ['#9096a0', '#545a63'] },
      { level: 9, name: 'Hungry Mimic', attackTime: 6.3, colors: ['#7b5ab8', '#2b2348'] },
      { level: 10, name: 'Void Beholder', attackTime: 6.6, colors: ['#bd5f86', '#512540'] },
      { level: 11, name: 'Elder Lich King', attackTime: 7.0, colors: ['#c379d6', '#55316d'] },
      { level: 12, name: 'Ancient Red Dragon', attackTime: 7.5, colors: ['#e35b45', '#741c19'] },
      { level: 13, name: 'Fire', attackTime: 2.0, colors: ['#ffb347', '#d92f1f'] },
    ];

    const LANES = ['lane-left', 'lane-mid', 'lane-right'];
    const KEYBOARD_ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
    const PROFILE_IMAGES = {
      idle: 'profile_idle.png',
      pain: 'profile_pain.png',
      dying: 'profile_dying.png',
    };
    const BASE_MAX_HP = 3;
    const BASE_MAX_SHIELDS = 3;
    const MAX_MONSTERS = 3;
    const TYPO_TIME_PENALTY = 0.5;
    const DODGE_WINDOW = 0.5;
    const DODGE_COOLDOWN = 1.0;
    const INPUT_RESULT_THRESHOLDS = { perfect: 0.2, great: 0.5, good: 3.0 };
    const FLOOR_CONFIGS = {
      1: { quota: 5, levels: [1, 2, 3] },
      2: { quota: 5, levels: [3, 4, 5] },
      3: { quota: 7, levels: [5, 6, 7] },
      4: { quota: 7, levels: [7, 8, 9] },
      5: { quota: 9, levels: [9, 10], firstBossLevel: 11, bossSpawnNumber: 6 },
      6: { quota: 6, levels: [13], waveMode: 'fireDragon' },
    };
    const MAX_FLOOR = 6;


    const game = document.getElementById('game');
    const monsterLayer = document.getElementById('monsterLayer');
    const heartsEl = document.getElementById('hearts');
    const shieldsEl = document.getElementById('shields');
    const potionSlot = document.getElementById('potionSlot');
    const potionIcon = document.getElementById('potionIcon');
    const potionHotkey = document.getElementById('potionHotkey');
    const levelText = document.getElementById('levelText');
    const expFill = document.getElementById('expFill');
    const expText = document.getElementById('expText');
    const messageEl = document.getElementById('message');
    const killCountEl = document.getElementById('killCount');
    const portrait = document.getElementById('portrait');
    const profileImage = document.getElementById('profileImage');
    const inputBubble = document.getElementById('inputBubble');
    const guardShield = document.getElementById('guardShield');
    const sword = document.getElementById('sword');
    const bloodFlash = document.getElementById('bloodFlash');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const endTitle = document.getElementById('endTitle');
    const endDesc = document.getElementById('endDesc');
    const startButton = document.getElementById('startButton');
    const cheatToggle = document.getElementById('cheatToggle');
    const restartButton = document.getElementById('restartButton');
    const homeButton = document.getElementById('homeButton');
    const monsterTable = document.getElementById('monsterTable');
    const comboToast = document.getElementById('comboToast');
    const floorText = document.getElementById('floorText');
    const floorProgressText = document.getElementById('floorProgressText');
    const playTimeHud = document.getElementById('playTimeHud');
    const alphaKeyboard = document.getElementById('alphaKeyboard');

    let player;
    let monsters;
    let activeMonsterId;
    let inputHintMode;
    let lastTime;
    let spawnTimer;
    let nextMonsterId;
    let gameState;
    let elapsed;
    let animationId;
    let lastInputTime;
    let isBlocking = false;
    let progressKeyArmed = true;
    let dragonSpawned = false;
    let currentFloor = 1;
    let floorSpawned = 0;
    let floorKills = 0;
    let floorFirstBossSpawned = false;
    let stageProgressReady = false;
    let stageProgressDelayTimeout = null;
    let dodgeCooldownUntil = 0;
    let dodgeCooldownTimer = null;
    let shieldBlockTimeout = null;
    let profilePainTimeout = null;
    let cheatCodeEnabled = false;

    function normalizeName(name) {
      return name.toLowerCase().replace(/\s+/g, '');
    }

    function expNeeded(level) {
      // 레벨이 오를수록 필요 경험치가 지수함수처럼 더 빠르게 증가합니다.
      return Math.floor(140 * Math.pow(1.35, level - 1));
    }

    function expReward(monsterLevel) {
      if (monsterLevel === 13) return 0;
      return 34 + monsterLevel * 13;
    }

    function formatPlayTime(seconds) {
      const totalSeconds = Math.max(0, Math.floor(seconds || 0));
      const minutes = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updatePlayTimeHud() {
      if (playTimeHud) playTimeHud.textContent = formatPlayTime(elapsed);
    }

    function renderMonsterTable() {
      if (!monsterTable) return;
      monsterTable.innerHTML = MONSTER_DATA.map(m => `
        <div><b>Lv.${m.level}</b><span>${m.name}</span><span>${m.attackTime.toFixed(1)}초</span></div>
      `).join('');
    }

    function renderAlphabetKeyboard() {
      if (!alphaKeyboard) return;
      alphaKeyboard.innerHTML = KEYBOARD_ROWS.map((row, index) => {
        const shieldButton = index === 2
          ? `<button type="button" class="alpha-key shield-key" data-action="shield" aria-label="방어">방어</button>`
          : '';
        const dodgeButton = index === 2
          ? `<button type="button" class="alpha-key dodge-key" data-action="dodge" aria-label="회피">회피</button>`
          : '';
        return `
          <div class="alpha-row">
            ${shieldButton}
            ${row.split('').map(key => `<button type="button" class="alpha-key" data-key="${key.toLowerCase()}" aria-label="${key} 입력">${key}</button>`).join('')}
            ${dodgeButton}
          </div>
        `;
      }).join('');
    }

    function updateActionButtonStates() {
      if (!alphaKeyboard) return;
      const shieldButton = alphaKeyboard.querySelector('.shield-key');
      const dodgeButton = alphaKeyboard.querySelector('.dodge-key');
      const now = performance.now() / 1000;
      const shieldEnabled = gameState === 'playing' && player && player.shields > 0;
      const cooldownRemaining = Math.max(0, dodgeCooldownUntil - now);
      const dodgeEnabled = gameState === 'playing' && cooldownRemaining <= 0;
      if (shieldButton) {
        shieldButton.classList.toggle('disabled', !shieldEnabled);
        shieldButton.disabled = !shieldEnabled;
        shieldButton.textContent = '방어';
      }
      if (dodgeButton) {
        dodgeButton.classList.toggle('disabled', !dodgeEnabled);
        dodgeButton.disabled = !dodgeEnabled;
        dodgeButton.textContent = dodgeEnabled ? '회피' : `${cooldownRemaining.toFixed(1)}초`;
        dodgeButton.setAttribute('aria-label', dodgeEnabled ? '회피' : `회피 쿨타임 ${cooldownRemaining.toFixed(1)}초`);
      }
    }

    function showInputBubble(char) {
      if (!inputBubble || !char) return;
      inputBubble.textContent = char.toUpperCase();
      inputBubble.classList.remove('show');
      void inputBubble.offsetWidth;
      inputBubble.classList.add('show');
    }

    function handleAlphabetButton(char) {
      if (gameState !== 'playing') return;
      animateSword();
      typeCharacter(char);
    }


    function usePotion() {
      if (gameState !== 'playing') return;
      if (!player || player.potions <= 0) {
        setMessage('사과가 없습니다.');
        updateActionButtonStates();
        return;
      }
      player.potions = Math.max(0, player.potions - 1);
      player.hp = player.maxHp;
      renderHud();
      setMessage('사과 사용! 생명력이 모두 회복되었습니다.');
    }

    function useDodge() {
      if (gameState !== 'playing') return;

      const now = performance.now() / 1000;
      if (now < dodgeCooldownUntil) {
        updateActionButtonStates();
        return;
      }

      dodgeCooldownUntil = now + DODGE_COOLDOWN;
      updateActionButtonStates();

      if (dodgeCooldownTimer) clearInterval(dodgeCooldownTimer);
      dodgeCooldownTimer = setInterval(() => {
        updateActionButtonStates();
        if (performance.now() / 1000 >= dodgeCooldownUntil) {
          clearInterval(dodgeCooldownTimer);
          dodgeCooldownTimer = null;
          updateActionButtonStates();
        }
      }, 100);

      const target = monsters
        .filter(monster => monster.remaining > 0 && monster.remaining <= DODGE_WINDOW)
        .sort((a, b) => a.remaining - b.remaining)[0];

      if (!target) {
        animateDodgeFailFeedback();
        setMessage('회피 실패! 공격 타이밍이 아닙니다.');
        return;
      }

      target.remaining = target.attackTime;
      target.el.classList.remove('attack');
      void target.el.offsetWidth;
      target.el.classList.add('attack');
      animateDodgeFeedback();
      updateMonsterElement(target);
      setMessage(`${target.name}의 공격을 회피했습니다!`);
    }

    function resetGame(startFloor = 1) {
      const requestedFloor = Number.isFinite(startFloor) ? startFloor : 1;
      const initialFloor = Math.max(1, Math.min(MAX_FLOOR, Math.floor(requestedFloor)));
      cancelAnimationFrame(animationId);
      player = {
        hp: BASE_MAX_HP,
        maxHp: BASE_MAX_HP,
        shields: BASE_MAX_SHIELDS,
        maxShields: BASE_MAX_SHIELDS,
        potions: 1,
        level: 1,
        exp: 0,
        kills: 0,
      };
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      lastTime = performance.now();
      spawnTimer = 0.2;
      nextMonsterId = 1;
      dragonSpawned = false;
      currentFloor = initialFloor;
      floorSpawned = 0;
      floorKills = 0;
      floorFirstBossSpawned = false;
      dodgeCooldownUntil = 0;
      stageProgressReady = false;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      if (dodgeCooldownTimer) { clearInterval(dodgeCooldownTimer); dodgeCooldownTimer = null; }
      gameState = 'playing';
      progressKeyArmed = true;
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      elapsed = 0;
      updatePlayTimeHud();
      lastInputTime = performance.now() / 1000;
      monsterLayer.innerHTML = '';
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      endOverlay.classList.add('hidden');
      startOverlay.classList.add('hidden');
      setFloorMessage();
      clearProfilePain();
      renderHud();
      updateKeyboardHint();
      loop(lastTime);
    }

    function setProfileImage(src) {
      if (!profileImage || profileImage.getAttribute('src') === src) return;
      profileImage.src = src;
    }

    function updateProfileImage() {
      if (!player || !profileImage || portrait.classList.contains('pain')) return;
      setProfileImage(player.hp <= 1 ? PROFILE_IMAGES.dying : PROFILE_IMAGES.idle);
    }

    function clearProfilePain() {
      if (profilePainTimeout) {
        clearTimeout(profilePainTimeout);
        profilePainTimeout = null;
      }
      portrait.classList.remove('pain');
      updateProfileImage();
    }

    function showProfilePain() {
      if (!profileImage) return;
      if (profilePainTimeout) clearTimeout(profilePainTimeout);
      portrait.classList.add('pain');
      setProfileImage(PROFILE_IMAGES.pain);
      profilePainTimeout = setTimeout(() => {
        profilePainTimeout = null;
        portrait.classList.remove('pain');
        updateProfileImage();
      }, 480);
    }

    function renderHud() {
      heartsEl.innerHTML = '';
      for (let i = 0; i < player.maxHp; i++) {
        const heart = document.createElement('span');
        heart.className = `heart ${i < player.hp ? 'full' : 'empty'}`;
        heart.textContent = i < player.hp ? '❤️' : '🤍';
        heartsEl.appendChild(heart);
      }

      shieldsEl.innerHTML = '';
      for (let i = 0; i < player.shields; i++) {
        const shield = document.createElement('span');
        shield.className = 'shield-charge full';
        shield.textContent = '🛡️';
        shieldsEl.appendChild(shield);
      }
      guardShield.style.display = player.shields > 0 ? '' : 'none';

      potionIcon.src = 'apple.png';
      potionSlot.style.display = player.potions > 0 ? 'inline-flex' : 'none';

      const need = expNeeded(player.level);
      const pct = Math.min(100, (player.exp / need) * 100);
      levelText.textContent = `Lv. ${player.level}`;
      expFill.style.width = `${pct}%`;
      expText.textContent = `${player.exp} / ${need}`;
      updateProfileImage();
      if (killCountEl) killCountEl.textContent = player.kills;
      renderStageHud();
      updateActionButtonStates();
    }

    function setMessage(text) {
      messageEl.innerHTML = text;
    }

    function renderStageHud() {
      const config = FLOOR_CONFIGS[currentFloor];
      const total = config ? config.quota : 1;
      const progress = Math.min(100, Math.floor((floorKills / total) * 100));
      if (floorText) floorText.textContent = `지하 ${currentFloor}층`;
      if (floorProgressText) floorProgressText.textContent = `${progress}%`;
    }

    function setFloorMessage() {
      setMessage('<span class="message-line">몬스터 이름을 입력해 처치하세요!</span><span class="message-line"><span class="kbd">Space</span>로 방어! <span class="kbd">Tab</span>으로 회피!</span>');
    }

    function getMonsterDataByLevel(level) {
      return MONSTER_DATA.find(monster => monster.level === level);
    }


    function setBlocking(nextState) {
      const canBlock = gameState === 'playing' && player && player.shields > 0;
      isBlocking = !!nextState && canBlock;
      if (!isBlocking) {
        guardShield.classList.remove('block');
        if (shieldBlockTimeout) {
          clearTimeout(shieldBlockTimeout);
          shieldBlockTimeout = null;
        }
      }
      guardShield.classList.toggle('holding', isBlocking);
      updateActionButtonStates();
    }

    function animateShieldBlock() {
      if (shieldBlockTimeout) {
        clearTimeout(shieldBlockTimeout);
        shieldBlockTimeout = null;
      }
      guardShield.classList.remove('block');
      void guardShield.offsetWidth;
      guardShield.classList.add('block');
      shieldBlockTimeout = setTimeout(() => {
        guardShield.classList.remove('block');
        shieldBlockTimeout = null;
      }, 190);
    }


    function animateBlockFeedback() {
      portrait.classList.remove('hit');
      bloodFlash.classList.remove('show', 'blocked', 'dodged');
      game.classList.remove('shake', 'block-shake', 'dodge-shake');
      void portrait.offsetWidth;
      portrait.classList.add('hit');
      bloodFlash.classList.add('blocked', 'show');
      game.classList.add('block-shake');
    }

    function animateDodgeFeedback() {
      portrait.classList.remove('hit');
      bloodFlash.classList.remove('show', 'blocked', 'dodged');
      game.classList.remove('shake', 'block-shake', 'dodge-shake');
      void portrait.offsetWidth;
      void game.offsetWidth;
      portrait.classList.add('hit');
      bloodFlash.classList.add('dodged', 'show');
      game.classList.add('dodge-shake');
    }

    function animateDodgeFailFeedback() {
      bloodFlash.classList.remove('show', 'blocked', 'dodged');
      game.classList.remove('shake', 'block-shake', 'dodge-shake');
      void game.offsetWidth;
      game.classList.add('dodge-shake');
    }

    function getInputDelta() {
      const now = performance.now() / 1000;
      const delta = lastInputTime == null ? Infinity : now - lastInputTime;
      lastInputTime = now;
      return delta;
    }

    function getResultLabel(delta) {
      if (delta <= INPUT_RESULT_THRESHOLDS.perfect) return { text: 'Perfect', className: 'perfect' };
      if (delta <= INPUT_RESULT_THRESHOLDS.great) return { text: 'Great', className: 'great' };
      if (delta <= INPUT_RESULT_THRESHOLDS.good) return { text: 'Good', className: 'good' };
      return { text: 'Bad', className: 'bad' };
    }

    function showMonsterResult(monster, text, className = '') {
      if (!monster || !monster.resultsEl) return;

      const activeResults = [...monster.resultsEl.querySelectorAll('.monster-result')];
      activeResults.forEach((item, index) => {
        const offset = -(index + 1) * 18;
        item.style.setProperty('--stack-offset', `${offset}px`);
      });

      const resultEl = document.createElement('div');
      resultEl.className = `monster-result ${className}`.trim();
      resultEl.textContent = text;
      resultEl.style.setProperty('--stack-offset', '0px');
      monster.resultsEl.appendChild(resultEl);
      void resultEl.offsetWidth;
      resultEl.classList.add('show');

      setTimeout(() => {
        resultEl.remove();
      }, 1000);
    }

    function showMissOnRelevantMonsters() {
      if (!monsters.length) return;
      const untouched = monsters.every(monster => monster.progress === 0);
      if (untouched) {
        monsters.forEach(monster => showMonsterResult(monster, 'Miss', 'miss'));
        return;
      }
      const target = monsters.find(monster => monster.id === activeMonsterId);
      if (target) showMonsterResult(target, 'Miss', 'miss');
    }

    function applyTypoPenalty(reason) {
      if (gameState !== 'playing') return;

      getInputDelta();

      if (!monsters.length) {
        setMessage(reason);
        return;
      }

      showMissOnRelevantMonsters();

      for (const monster of monsters) {
        monster.remaining = Math.max(0, monster.remaining - TYPO_TIME_PENALTY);
        updateMonsterElement(monster);
      }

      setMessage(`${reason} 모든 몬스터의 공격 준비 시간이 ${TYPO_TIME_PENALTY.toFixed(1)}초 줄었습니다.`);
    }

    function updateKeyboardHint() {
      if (!alphaKeyboard) return;

      const keys = alphaKeyboard.querySelectorAll('.alpha-key');
      keys.forEach(key => key.classList.remove('next-key'));

      if (gameState !== 'playing') return;

      const target = monsters.find(m => m.id === activeMonsterId);
      if (!target) return;

      const nextChar = target.normalized[target.progress];
      if (!nextChar) return;

      const nextKey = alphaKeyboard.querySelector(`.alpha-key[data-key="${nextChar}"]`);
      if (nextKey) nextKey.classList.add('next-key');
    }

    function loop(now) {
      if (gameState !== 'playing') return;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      elapsed += dt;
      updatePlayTimeHud();

      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        trySpawnMonster();
        spawnTimer = getSpawnInterval();
      }

      for (const monster of [...monsters]) {
        monster.remaining -= dt;
        if (monster.remaining <= 0) {
          monsterAttack(monster);
        }
        updateMonsterElement(monster);
      }

      animationId = requestAnimationFrame(loop);
    }

    function getSpawnInterval() {
      // 기본 3초에서 시작해서 플레이 시간과 레벨에 따라 조금씩 빨라집니다.
      const speedUp = elapsed * 0.018 + (player.level - 1) * 0.08;
      return Math.max(1.15, 3.0 - speedUp);
    }

    function getRandomMonsterData() {
      const config = FLOOR_CONFIGS[currentFloor];
      if (!config) return MONSTER_DATA[0];

      const bossSpawnNumber = config.bossSpawnNumber || 1;
      const isBossSpawnTurn = floorSpawned + 1 >= bossSpawnNumber;
      if (config.firstBossLevel && !floorFirstBossSpawned && isBossSpawnTurn) {
        return getMonsterDataByLevel(config.firstBossLevel);
      }

      const candidates = MONSTER_DATA.filter(monster => config.levels.includes(monster.level));
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function getSpawnLaneForData(data) {
      const config = FLOOR_CONFIGS[currentFloor];
      const usedLanes = new Set(monsters.map(monster => monster.lane));
      const freeLanes = LANES.filter(lane => !usedLanes.has(lane));
      if (!freeLanes.length) return null;

      if (config && config.firstBossLevel === data.level && !floorFirstBossSpawned && freeLanes.includes('lane-mid')) {
        return 'lane-mid';
      }

      return freeLanes[Math.floor(Math.random() * freeLanes.length)];
    }

    function trySpawnMonster() {
      const config = FLOOR_CONFIGS[currentFloor];
      if (!config) return;

      if (config.waveMode === 'fireDragon') {
        trySpawnFloor6Wave();
        return;
      }

      if (monsters.length >= MAX_MONSTERS) return;
      if (floorSpawned >= config.quota) return;

      const data = getRandomMonsterData();
      if (!data) return;

      const lane = getSpawnLaneForData(data);
      if (!lane) return;

      spawnMonster(data, lane);
      floorSpawned += 1;

      if (config.firstBossLevel === data.level && !floorFirstBossSpawned) {
        floorFirstBossSpawned = true;
      }
    }

    function trySpawnFloor6Wave() {
      if (currentFloor !== 6) return;
      if (monsters.length > 0) return;

      const fireData = getMonsterDataByLevel(13);
      const dragonData = getMonsterDataByLevel(12);
      if (!fireData || !dragonData) return;

      if (floorSpawned === 0) {
        spawnMonster(fireData, 'lane-left');
        spawnMonster(fireData, 'lane-mid');
        spawnMonster(fireData, 'lane-right');
        floorSpawned = 3;
        return;
      }

      if (floorSpawned === 3 && floorKills >= 3) {
        spawnMonster(fireData, 'lane-left');
        spawnMonster(dragonData, 'lane-mid');
        spawnMonster(fireData, 'lane-right');
        floorSpawned = 6;
        floorFirstBossSpawned = true;
      }
    }

    function spawnMonster(data, lane) {
      if (data.name === 'Ancient Red Dragon') {
        dragonSpawned = true;
      }

      const monster = {
        id: nextMonsterId++,
        level: data.level,
        name: data.name,
        normalized: normalizeName(data.name),
        attackTime: data.attackTime,
        remaining: data.attackTime,
        progress: 0,
        lane,
      };

      const spriteIndex = Math.max(0, Math.min(15, data.level - 1));
      const spriteCol = spriteIndex % 4;
      const spriteRow = Math.floor(spriteIndex / 4);
      const spritePosition = value => `${(value / 3) * 100}%`;

      const el = document.createElement('div');
      const levelClass = data.level <= 3 ? 'level-low' : '';
      el.className = `monster ${levelClass} ${lane}`;
      el.dataset.id = monster.id;
      el.style.setProperty('--monster-sprite-x', spritePosition(spriteCol));
      el.style.setProperty('--monster-sprite-y', spritePosition(spriteRow));
      el.innerHTML = `
        <div class="nameplate">
          <div class="monster-results"></div>
          <div class="word"></div>
          <div class="timer-ring" data-time="${Math.max(0, Math.ceil(monster.remaining))}"></div>
        </div>
        <div class="monster-body">
          <div class="monster-hit-slash"></div>
          <div class="defeat-burst" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="enemy-lv">Lv.${monster.level}</div>
        </div>
      `;
      monster.el = el;
      monster.wordEl = el.querySelector('.word');
      monster.resultsEl = el.querySelector('.monster-results');
      monster.timerEl = el.querySelector('.timer-ring');
      monsterLayer.appendChild(el);
      monsters.push(monster);
      renderMonsterWord(monster);
      updateMonsterElement(monster);
    }

    function shouldHighlightNeededChar(monster, normalizedIndex) {
      if (normalizedIndex < monster.progress) return false;

      if (inputHintMode && inputHintMode.type === 'active-next') {
        return monster.id === inputHintMode.monsterId && normalizedIndex === monster.progress;
      }

      if (inputHintMode && inputHintMode.type === 'all-first') {
        return normalizedIndex === 0;
      }

      return false;
    }

    function renderAllMonsterWords() {
      monsters.forEach(monster => renderMonsterWord(monster));
    }

    function setInputHintMode(mode) {
      inputHintMode = mode;
      renderAllMonsterWords();
    }

    function clearInputHintMode() {
      inputHintMode = null;
      renderAllMonsterWords();
    }

    function renderMonsterWord(monster) {
      let normalizedIndex = 0;
      let html = '';
      for (const ch of monster.name) {
        if (ch === ' ') {
          const done = monster.progress > normalizedIndex;
          html += `<span class="space ${done ? 'done' : ''}">&nbsp;</span>`;
        } else {
          const done = normalizedIndex < monster.progress;
          const needInput = shouldHighlightNeededChar(monster, normalizedIndex);
          const classes = [done ? 'done' : '', needInput ? 'need-input' : ''].filter(Boolean).join(' ');
          html += `<span class="${classes}">${ch}</span>`;
          normalizedIndex++;
        }
      }
      monster.wordEl.innerHTML = html;
    }

    function updateMonsterElement(monster) {
      const ratio = Math.max(0, Math.min(1, monster.remaining / monster.attackTime));
      const used = 1 - ratio;
      const deg = used * 360;
      const dangerColor = used > .72 ? '#ff5a6d' : used > .45 ? '#ffd166' : '#68e0a8';
      monster.timerEl.style.background = `conic-gradient(${dangerColor} ${deg}deg, rgba(255,255,255,.13) ${deg}deg)`;
      monster.timerEl.dataset.time = String(Math.max(0, Math.ceil(monster.remaining)));
      monster.el.classList.toggle('active', monster.id === activeMonsterId);
    }

    function setMonsterLane(monster, lane) {
      if (!monster || !monster.el || !lane || monster.lane === lane) return;
      LANES.forEach(laneClass => monster.el.classList.remove(laneClass));
      monster.lane = lane;
      monster.el.classList.add(lane);
    }

    function swapLevel11MonsterLane(monster) {
      if (!monster || monster.level !== 11 || !LANES.includes(monster.lane)) return;

      const nextLanes = LANES.filter(lane => lane !== monster.lane);
      if (!nextLanes.length) return;

      const nextLane = nextLanes[Math.floor(Math.random() * nextLanes.length)];
      const previousLane = monster.lane;
      const otherMonster = monsters.find(item => item.id !== monster.id && item.lane === nextLane);

      setMonsterLane(monster, nextLane);
      if (otherMonster) setMonsterLane(otherMonster, previousLane);
    }

    function monsterAttack(monster) {
      monster.remaining = monster.attackTime;
      monster.el.classList.remove('attack');
      void monster.el.offsetWidth;
      monster.el.classList.add('attack');

      if (isBlocking && player.shields > 0) {
        player.shields = Math.max(0, player.shields - 1);
        renderHud();
        animateShieldBlock();
        animateBlockFeedback();
        setMessage(`${monster.name}의 공격을 방어했습니다!`);
        if (player.shields <= 0) setBlocking(false);
        return;
      }

      if (monster.level === 12) {
        damageDoguri(`${monster.name}의 치명적인 공격!`, player.hp);
        return;
      }

      damageDoguri(`${monster.name}의 공격!`);
    }

    function goToStart() {
      cancelAnimationFrame(animationId);
      gameState = 'start';
      progressKeyArmed = true;
      stageProgressReady = false;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      monsterLayer.innerHTML = '';
      isBlocking = false;
      guardShield.classList.remove('holding', 'block');
      if (shieldBlockTimeout) { clearTimeout(shieldBlockTimeout); shieldBlockTimeout = null; }
      endOverlay.classList.add('hidden');
      startOverlay.classList.remove('hidden');
      restartButton.textContent = '다시 도전';
      clearProfilePain();
      updateKeyboardHint();
      lastInputTime = null;
      setMessage('<span class="message-line">몬스터 이름을 입력해 처치하세요!</span><span class="message-line"><span class="kbd">Space</span>로 방어! <span class="kbd">Tab</span>으로 회피!</span>');
    }


    function updateCheatToggle() {
      if (!cheatToggle) return;
      cheatToggle.classList.toggle('active', cheatCodeEnabled);
      cheatToggle.setAttribute('aria-pressed', String(cheatCodeEnabled));
      cheatToggle.textContent = cheatCodeEnabled ? '치트 ON' : '치트 OFF';
    }

    function startFromCheatFloor(floor) {
      if (!cheatCodeEnabled) return false;
      if (!Number.isInteger(floor) || floor < 1 || floor > MAX_FLOOR) return false;
      resetGame(floor);
      return true;
    }

    function pressProgressButton() {
      if (!progressKeyArmed) return false;

      if (!startOverlay.classList.contains('hidden')) {
        resetGame();
        return true;
      }
      if (!endOverlay.classList.contains('hidden')) {
        if (gameState === 'stageclear') {
          if (!stageProgressReady) return false;
          startNextFloor();
        } else {
          resetGame();
        }
        return true;
      }
      return false;
    }

    function handleKeydown(e) {
      if (gameState !== 'playing') {
        const startScreenVisible = !startOverlay.classList.contains('hidden');
        const endScreenVisible = !endOverlay.classList.contains('hidden');

        if (startScreenVisible && cheatCodeEnabled && /^[1-6]$/.test(e.key)) {
          e.preventDefault();
          startFromCheatFloor(Number(e.key));
          return;
        }

        if (endScreenVisible && e.key === 'Escape' && gameState !== 'stageclear') {
          e.preventDefault();
          goToStart();
          return;
        }

        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          pressProgressButton();
        }
        return;
      }

      if (e.key === ' ') {
        e.preventDefault();
        if (e.repeat) return;
        if (player.shields <= 0) {
          setMessage('방패 능력이 없어 방어할 수 없습니다.');
          return;
        }
        setBlocking(true);
        return;
      }

      if (e.key === 'Control') {
        e.preventDefault();
        if (e.repeat) return;
        usePotion();
        return;
      }

      if (e.key === 'Tab') {
        e.preventDefault();
        if (e.repeat) return;
        useDodge();
        return;
      }

      if (e.key.length !== 1) return;
      const char = e.key.toLowerCase();
      if (!/^[a-z]$/.test(char)) return;
      e.preventDefault();

      animateSword();
      typeCharacter(char);
    }

    function handleKeyup(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        progressKeyArmed = true;
      }

      if (e.key === 'Control' || e.key === 'Tab' || e.key === 'Escape') {
        e.preventDefault();
      }

      if (gameState !== 'playing') return;

      if (e.key === ' ') {
        e.preventDefault();
        setBlocking(false);
      }
    }

    function typeCharacter(char) {
      showInputBubble(char);
      if (!monsters.length) {
        applyTypoPenalty('허공을 베었습니다. 아직 몬스터가 없습니다!');
        updateKeyboardHint();
        return;
      }

      let target = monsters.find(m => m.id === activeMonsterId);
      if (target && target.normalized[target.progress] !== char) {
        setInputHintMode({ type: 'active-next', monsterId: target.id });
        applyTypoPenalty(`오타! ${target.name}의 다음 글자는 “${target.normalized[target.progress].toUpperCase()}”입니다.`);
        updateKeyboardHint();
        return;
      }

      if (!target) {
        const matching = monsters
          .filter(m => m.normalized[m.progress] === char)
          .sort((a, b) => a.remaining - b.remaining || b.progress - a.progress);
        target = matching[0];
        if (!target) {
          setInputHintMode({ type: 'all-first' });
          applyTypoPenalty('오타! 몬스터 이름과 맞지 않습니다.');
          updateKeyboardHint();
          return;
        }
        activeMonsterId = target.id;
      }

      inputHintMode = null;
      const inputDelta = getInputDelta();
      const inputResult = getResultLabel(inputDelta);
      target.progress += 1;
      target.remaining = Math.min(target.attackTime, target.remaining + 0.1); // 정확한 입력 보너스
      animateMonsterHit(target);
      showMonsterResult(target, inputResult.text, inputResult.className);
      renderAllMonsterWords();
      updateMonsterElement(target);

      if (target.level === 11 && target.progress < target.normalized.length) {
        swapLevel11MonsterLane(target);
      }

      updateKeyboardHint();

      if (target.progress >= target.normalized.length) {
        killMonster(target);
      }
    }

    function killMonster(monster) {
      player.kills += 1;
      floorKills += 1;
      const gained = expReward(monster.level);
      if (gained > 0) player.exp += gained;
      setMessage(`${monster.name} 처치!`);
      renderStageHud();

      monster.el.classList.add('dead');
      monsters = monsters.filter(m => m.id !== monster.id);
      if (activeMonsterId === monster.id) activeMonsterId = null;
      inputHintMode = null;
      renderAllMonsterWords();
      updateKeyboardHint();
      setTimeout(() => monster.el.remove(), 440);

      while (player.exp >= expNeeded(player.level) && player.level < 12) {
        player.exp -= expNeeded(player.level);
        player.level += 1;
        player.maxHp += 1;
        player.hp = player.maxHp;
        showToast('레벨업!');
        setMessage(`레벨 업! 도구리 Lv.${player.level}. 최대 생명력 +1, 생명력이 모두 회복되었습니다.`);
      }
      renderHud();
      if (currentFloor === 6) trySpawnFloor6Wave();
      checkFloorClear();
    }

    function checkFloorClear() {
      const config = FLOOR_CONFIGS[currentFloor];
      if (!config || gameState !== 'playing') return;
      if (floorKills >= config.quota && floorSpawned >= config.quota && monsters.length === 0) {
        if (currentFloor >= MAX_FLOOR) {
          winGame();
        } else {
          stageClear();
        }
      }
    }

    function stageClear() {
      gameState = 'stageclear';
      setBlocking(false);
      stageProgressReady = false;
      if (stageProgressDelayTimeout) clearTimeout(stageProgressDelayTimeout);
      stageProgressDelayTimeout = setTimeout(() => {
        stageProgressReady = true;
        stageProgressDelayTimeout = null;
      }, 500);
      cancelAnimationFrame(animationId);
      endTitle.textContent = `지하 ${currentFloor}층 클리어!`;
      endDesc.innerHTML = `지하 ${currentFloor}층의 몬스터를 모두 처치했습니다.<br /><b>Space</b>를 누르면 지하 ${currentFloor + 1}층으로 이동합니다.`;
      restartButton.textContent = '다음 층';
      const homeActionCol = homeButton.closest('.end-action-col');
      if (homeActionCol) homeActionCol.style.display = 'none';
      endOverlay.classList.remove('hidden');
      updateKeyboardHint();
    }

    function startNextFloor() {
      currentFloor += 1;
      floorSpawned = 0;
      floorKills = 0;
      floorFirstBossSpawned = false;
      monsters = [];
      activeMonsterId = null;
      inputHintMode = null;
      monsterLayer.innerHTML = '';
      spawnTimer = 0.2;
      lastTime = performance.now();
      gameState = 'playing';
      progressKeyArmed = true;
      stageProgressReady = false;
      if (stageProgressDelayTimeout) { clearTimeout(stageProgressDelayTimeout); stageProgressDelayTimeout = null; }
      endOverlay.classList.add('hidden');
      setFloorMessage();
      renderStageHud();
      updatePlayTimeHud();
      updateKeyboardHint();
      updateActionButtonStates();
      loop(lastTime);
    }

    function damageDoguri(reason, amount = 1) {
      if (gameState !== 'playing') return;
      player.hp = Math.max(0, player.hp - amount);
      renderHud();
      setMessage(reason);

      portrait.classList.remove('hit');
      bloodFlash.classList.remove('show', 'blocked', 'dodged');
      game.classList.remove('shake', 'block-shake', 'dodge-shake');
      void portrait.offsetWidth;
      portrait.classList.add('hit');
      showProfilePain();
      bloodFlash.classList.add('show');
      game.classList.add('shake');

      if (player.hp <= 0) {
        gameOver();
      }
    }

    function animateSword() {
      sword.classList.remove('slash');
      void sword.offsetWidth;
      sword.classList.add('slash');
    }

    function animateMonsterHit(monster) {
      if (!monster || !monster.el) return;
      const offsetX = Math.round((Math.random() * 36) - 18);
      const offsetY = Math.round((Math.random() * 28) - 14);
      const rotate = Math.round((Math.random() * 14) - 7);
      monster.el.style.setProperty('--slash-offset-x', `${offsetX}px`);
      monster.el.style.setProperty('--slash-offset-y', `${offsetY}px`);
      monster.el.style.setProperty('--slash-rotate', `${rotate}deg`);
      monster.el.classList.remove('hit');
      void monster.el.offsetWidth;
      monster.el.classList.add('hit');
    }

    function showToast(text) {
      comboToast.textContent = text;
      comboToast.classList.remove('show');
      void comboToast.offsetWidth;
      comboToast.classList.add('show');
    }

    function gameOver() {
      gameState = 'gameover';
      setBlocking(false);
      if (profilePainTimeout) {
        clearTimeout(profilePainTimeout);
        profilePainTimeout = null;
      }
      portrait.classList.remove('pain');
      setProfileImage(PROFILE_IMAGES.dying);
      cancelAnimationFrame(animationId);
      endTitle.textContent = '게임 오버';
      endDesc.innerHTML = `도구리가 쓰러졌습니다.<br />도달 층: <b>${currentFloor}층</b> · 처치한 몬스터: <b>${player.kills}</b>마리 · 도달 레벨: <b>Lv.${player.level}</b>`;
      restartButton.textContent = '다시 도전';
      const homeActionCol = homeButton.closest('.end-action-col');
      if (homeActionCol) homeActionCol.style.display = 'flex';
      endOverlay.classList.remove('hidden');
      updateKeyboardHint();
    }

    function winGame() {
      gameState = 'clear';
      setBlocking(false);
      cancelAnimationFrame(animationId);
      renderHud();
      updatePlayTimeHud();
      const clearTimeText = formatPlayTime(elapsed);
      endTitle.textContent = '게임 클리어!';
      endDesc.innerHTML = `6층의 모든 몬스터를 처치했습니다!<br />클리어 타임: <b>${clearTimeText}</b><br />도구리가 던전의 키보드 왕이 되었습니다.`;
      restartButton.textContent = '다시 도전';
      const homeActionCol = homeButton.closest('.end-action-col');
      if (homeActionCol) homeActionCol.style.display = 'flex';
      endOverlay.classList.remove('hidden');
      updateKeyboardHint();
    }

    if (alphaKeyboard) {
      alphaKeyboard.addEventListener('pointerdown', (e) => {
        const button = e.target.closest('.alpha-key');
        if (!button) return;
        e.preventDefault();

        if (button.dataset.action === 'shield') {
          if (gameState !== 'playing') return;
          if (player.shields <= 0) {
            setMessage('방패 능력이 없어 방어할 수 없습니다.');
            updateActionButtonStates();
            return;
          }
          setBlocking(true);
          return;
        }

        if (button.dataset.action === 'dodge') {
          useDodge();
          return;
        }

        handleAlphabetButton(button.dataset.key);
      });

      const releaseShieldButton = (e) => {
        const button = e.target.closest('.shield-key');
        if (!button) return;
        if (gameState !== 'playing') return;
        setBlocking(false);
      };

      alphaKeyboard.addEventListener('pointerup', releaseShieldButton);
      alphaKeyboard.addEventListener('pointercancel', releaseShieldButton);
      alphaKeyboard.addEventListener('pointerleave', (e) => {
        if (e.target.closest && e.target.closest('.shield-key')) {
          if (gameState === 'playing') setBlocking(false);
        }
      }, true);
    }

    potionSlot.addEventListener('click', (e) => {
      e.preventDefault();
      usePotion();
    });
    startButton.addEventListener('click', () => resetGame());
    if (cheatToggle) {
      cheatToggle.addEventListener('click', (e) => {
        e.preventDefault();
        cheatCodeEnabled = !cheatCodeEnabled;
        updateCheatToggle();
      });
    }
    restartButton.addEventListener('click', () => {
      if (gameState === 'stageclear') {
        if (!stageProgressReady) return;
        startNextFloor();
      } else {
        resetGame();
      }
    });
    homeButton.addEventListener('click', goToStart);
    window.addEventListener('keydown', handleKeydown, { passive: false });
    window.addEventListener('keyup', handleKeyup, { passive: false });

    updateCheatToggle();
    renderAlphabetKeyboard();
    renderMonsterTable();
    player = { hp: BASE_MAX_HP, maxHp: BASE_MAX_HP, shields: BASE_MAX_SHIELDS, maxShields: BASE_MAX_SHIELDS, potions: 1, level: 1, exp: 0, kills: 0 };
    elapsed = 0;
    updatePlayTimeHud();
    renderHud();
  </script>
</body>
</html>
